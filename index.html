<script type="text/babel">
const { useState, useMemo, useCallback, useEffect, useRef } = React;

/* ═══════════ CONFIG ═══════════ */
const WAX_CONFIG = {
  collection: "officialhero",
  schema: "series1",
  atomicApiBase: "https://aa.wax.blacklusion.io",
  ipfsGateway: "https://ipfs.io/ipfs/",
  rpcEndpoint: "https://wax.greymass.com",
};
const CARD_BACK = "https://copper-adequate-unicorn-990.mypinata.cloud/ipfs/QmZ91Zj5PZUnL2F8X9Hg2QXPP3UMbqaDqrRCyMrq6zchRN";
const RARITY_ORDER = { common:1, uncommon:2, rare:3, epic:4, legendary:5 };
const RARITY_CAPS = { legendary:4, epic:8, rare:10, uncommon:12, common:16 };
const DECK_SIZE = 50;
const MAX_ROUNDS = 50;

/* ═══════════ HERO POWER NAMES ═══════════ */
const HERO_POWER_NAMES = {
  "genesis":"The Unleashing","metalik":"Immutable Body","litespeed":"Faster Than Light",
  "coin commando":"Demolition Charge","coincommando":"Demolition Charge","trilogy":"Construct",
  "magic man":"The Vanishing Act","master control":"Smart Disc","stampede":"Chaotic Charge",
  "brightstroke":"Living Color Shield","mr wick":"Burn It Down","mr. wick":"Burn It Down",
  "cypherfunk":"Crypto Breach","felonious":"Jailbreak","the oracle":"Third Eye",
  "super stomp":"Immutable Temple","x-change":"Identity Theft","great gecko":"Wall Crawler",
  "courage":"Fearless Flight","renegade":"Ghost Protocol","lady lightning":"Chain Lightning",
  "silver scientist":"Data Transmutation","wyld wrangler":"Lasso Lock","the emissary":"Rally The People",
  "data avenger":"P.O.G. Strike","the wizard":"Cybermagic Script","overseer":"Mission Support",
  "forecaster":"Storm Front","professor axiom":"Emergent Proof","maximum":"Unstoppable Force",
  "the chairman":"Energy Shield","the senator":"Filibuster","mz stability":"Immovable Object",
  "dynamic defiant":"Telekinetic Surge","bitcoin bro":"Smoke Screen",
  "soothe 'n sayer":"Dual Commentary","sooth n sayer":"Dual Commentary","soothe n sayer":"Dual Commentary",
  "gingergirl":"Power Glove Punch","jester":"Wild Card","the creatrix":"Manifest",
  "scrivener":"Rewrite Reality","rowdy rook":"Aerial Dive","rocketman":"Turbine Boost",
  "the prophet":"Convert","rock fierce":"Boulder Toss","the crusader":"Immutable Armory",
  "supernova":"Nuclear Reaction","ethermage":"Uncounterable Spell","repeat":"Double Play",
  "executive powers":"Hostile Takeover","everlasting":"Time Warp","captain crypto":"Sonic Boom",
  "megamine":"Deep Drill",
};
/* Buff chance by rarity: chance to gain +1 strength (match next tier up) */
const BUFF_CHANCE = { legendary:0.05, epic:0.1, rare:0.2, uncommon:0.35, common:0.5 };
function getHeroPowerName(card){ return HERO_POWER_NAMES[normalizeHeroName(card?.name)] || null; }
function rollBuff(card){ const chance=BUFF_CHANCE[card?.rarity]||0; if(chance<=0)return false; return Math.random()<chance; }
const ALL_HEROES = [
  "Bitcoin Bro","Brightstroke","Captain Crypto","Coin Commando","Courage",
  "CypherFunk","Data Avenger","Dynamic Defiant","Ethermage","Everlasting",
  "Executive Powers","Felonious","Forecaster","Genesis","GingerGirl",
  "Great Gecko","Jester","Lady Lightning","Litespeed","Magic Man",
  "Master Control","Maximum","MegaMine","Metalik","Mr. Wick",
  "Mz Stability","Overseer","Professor Axiom","Renegade","Repeat",
  "Rock Fierce","Rocketman","Rowdy Rook","Scrivener","Silver Scientist",
  "Soothe 'n Sayer","Stampede","Super Stomp","Supernova","The Chairman",
  "The Creatrix","The Crusader","The Emissary","The Oracle","The Prophet",
  "The Senator","The Wizard","Trilogy","Wyld Wrangler","X-Change",
];
const OPPONENTS = [
  { id:"collector", name:"The Collector", description:"Balanced legal deck.", strategy:["legendary","epic","rare","uncommon","common"] },
  { id:"eddie", name:"Epic Eddie", description:"Prefers epic-heavy builds.", strategy:["epic","rare","legendary","uncommon","common"] },
  { id:"crusher", name:"Common Crusher", description:"Leans on low-rarity depth.", strategy:["common","uncommon","rare","epic","legendary"] },
];
/* Mock deck removed — wallet login required to play */

/* ═══════════ HELPERS ═══════════ */
function normalizeHeroName(n){ return (n||"").trim().toLowerCase().replace(/[^a-z0-9 ]/g,"").replace(/\s+/g," "); }
function getHeroKey(c){ return normalizeHeroName(c.name); }
function getCardStrength(c){ return RARITY_ORDER[c?.rarity]||0; }
function titleCase(v){ return v.charAt(0).toUpperCase()+v.slice(1); }
function shuffleArray(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; } return b; }
function countByRarity(d){ const c={legendary:0,epic:0,rare:0,uncommon:0,common:0}; d.forEach(x=>c[x.rarity]++); return c; }
function heroInDeck(card,deck){ return deck.some(c=>c.id!==card.id && getHeroKey(c)===getHeroKey(card)); }
function canAdd(card,deck){ const c=countByRarity(deck); if(deck.length>=DECK_SIZE)return false; if(heroInDeck(card,deck))return false; return c[card.rarity]<RARITY_CAPS[card.rarity]; }
function groupCardsByHero(cards){ const m=new Map(); cards.forEach(c=>{ const k=getHeroKey(c); if(!m.has(k))m.set(k,[]); m.get(k).push(c); }); const order=["legendary","epic","rare","uncommon","common"]; m.forEach(arr=>arr.sort((a,b)=>RARITY_ORDER[b.rarity]-RARITY_ORDER[a.rarity])); return [...m.entries()].sort((a,b)=>a[0].localeCompare(b[0])); }

function normalizeRarity(raw) {
  const v = String(raw || "").trim().toLowerCase();
  if (v === "class" || v === "sticker") return null;
  if (v in RARITY_ORDER) return v;
  return "common";
}

function normalizeAtomicAsset(asset) {
  const data = asset?.data || {};
  const rarity = normalizeRarity(data.rarity || data.rank || data.tier);
  if (!rarity) return null;
  return {
    id: String(asset.asset_id),
    assetId: String(asset.asset_id),
    templateId: String(asset.template?.template_id || asset.template_id || ""),
    name: data.name || data.card_name || ("Template " + (asset.template?.template_id || "Unknown")),
    rarity: rarity,
    img: data.img || data.image || data.card_image || data.thumbnail
      || asset?.template?.immutable_data?.img || asset?.template?.immutable_data?.image || undefined,
  };
}

function buildImageUrl(img) {
  if (!img) return CARD_BACK;
  if (img.startsWith("http://") || img.startsWith("https://")) return img;
  if (img.startsWith("ipfs://")) return WAX_CONFIG.ipfsGateway + img.replace("ipfs://", "");
  return WAX_CONFIG.ipfsGateway + img;
}

async function fetchOwnedCards(account) {
  const allCards = [];
  let page = 1;
  while(true){
    const params = new URLSearchParams({
      owner: account,
      collection_name: WAX_CONFIG.collection,
      schema_name: WAX_CONFIG.schema,
      page: String(page),
      limit: "200",
      order: "desc",
      sort: "asset_id",
    });
    const res = await fetch(WAX_CONFIG.atomicApiBase + "/atomicassets/v1/assets?" + params.toString());
    if (!res.ok) throw new Error("AtomicAssets request failed: " + res.status);
    const payload = await res.json();
    const batch = (payload?.data || []);
    const normalized = batch.map(normalizeAtomicAsset).filter(Boolean);
    allCards.push(...normalized);
    if(batch.length < 200) break;
    page++;
  }
  return allCards;
}

const RARITIES = ["common","uncommon","rare","epic","legendary"];
function generateDemoCards(){
  const cards=[];
  ALL_HEROES.forEach((name,i)=>{
    RARITIES.forEach(r=>{
      cards.push({ id:"demo-"+i+"-"+r, assetId:"demo-"+i+"-"+r, templateId:"#D"+(i*5+RARITIES.indexOf(r)+1), name, rarity:r, img:undefined });
    });
  });
  return cards;
}

function buildDeck(pool){
  // Group cards by hero, one variant per hero
  const groups=new Map();
  pool.forEach(c=>{ const k=getHeroKey(c); if(!groups.has(k))groups.set(k,[]); groups.get(k).push(c); });
  // Sort heroes: fewest rarity options first (most constrained assigned first)
  const heroList=[...groups.entries()]
    .map(([k,variants])=>{
      const rarities=[...new Set(variants.map(c=>c.rarity))].filter(r=>(RARITY_CAPS[r]||0)>0);
      return {key:k, variants, rarities};
    })
    .sort((a,b)=>a.rarities.length-b.rarities.length);
  const rc={legendary:0,epic:0,rare:0,uncommon:0,common:0};
  const picks=new Map(); // heroKey -> card
  // First pass: assign most-constrained heroes first, prefer highest rarity (scarce slots first)
  for(const hero of heroList){
    if(picks.size>=DECK_SIZE)break;
    const available=hero.rarities.filter(r=>rc[r]<RARITY_CAPS[r]);
    if(available.length===0)continue;
    available.sort((a,b)=>RARITY_ORDER[b]-RARITY_ORDER[a]);
    const bestRarity=available[0];
    const card=hero.variants.find(c=>c.rarity===bestRarity);
    if(card){ picks.set(hero.key, card); rc[bestRarity]++; }
  }
  // Second pass: any heroes that got skipped, try again with updated caps
  for(const hero of heroList){
    if(picks.size>=DECK_SIZE)break;
    if(picks.has(hero.key))continue;
    const available=hero.rarities.filter(r=>rc[r]<RARITY_CAPS[r]);
    if(available.length===0)continue;
    available.sort((a,b)=>RARITY_ORDER[b]-RARITY_ORDER[a]);
    const card=hero.variants.find(c=>c.rarity===available[0]);
    if(card){ picks.set(hero.key, card); rc[card.rarity]++; }
  }
  return [...picks.values()];
}
const MAX_CHARGES = 5;
function createGame(pDeck,oDeck){ return { pp:shuffleArray(pDeck), op:shuffleArray(oDeck), tp:[], cur:null, reveal:false, round:0, winner:null, wfp:[], wfo:[], pPts:0, oPts:0, lastPtsWon:0, pCharges:MAX_CHARGES, pManualBuff:false, oCharges:MAX_CHARGES, oManualBuff:false, pPeeks:MAX_CHARGES, pPeeking:false }; }
function npcDecideBuff(g,pCard,oCard){
  if(g.oCharges<=0)return false;
  const ps=getCardStrength(pCard)+(g.pManualBuff?1:0);
  const os=getCardStrength(oCard);
  // Boost when losing by 1 (buff ties it) or tied (buff wins it)
  if(os<ps&&ps-os<=1)return true;
  if(os===ps)return true;
  return false;
}
function prepareRound(g){
  if(g.winner)return g;
  if(g.tp.length===0){
    if(!g.pp[0]||!g.op[0])return{...g,winner:!g.pp[0]&&!g.op[0]?"tie":g.pp[0]?"player":"opponent"};
    const pBuff=rollBuff(g.pp[0]), oBuff=rollBuff(g.op[0]);
    const oBst=npcDecideBuff(g,g.pp[0],g.op[0]);
    return{...g,cur:{p:g.pp[0],o:g.op[0]},pBuff,oBuff,oManualBuff:oBst,oCharges:g.oCharges-(oBst?1:0),reveal:true,wfp:[],wfo:[],pPeeking:false};
  }
  if(g.pp.length<3||g.op.length<3)return{...g,winner:g.pp.length===g.op.length?"tie":g.pp.length>g.op.length?"player":"opponent"};
  const pBuff=rollBuff(g.pp[2]), oBuff=rollBuff(g.op[2]);
  const oBst=npcDecideBuff(g,g.pp[2],g.op[2]);
  return{...g,cur:{p:g.pp[2],o:g.op[2]},pBuff,oBuff,oManualBuff:oBst,oCharges:g.oCharges-(oBst?1:0),reveal:true,wfp:g.pp.slice(0,2),wfo:g.op.slice(0,2),pPeeking:false};
}
function resolveRound(g){
  if(!g.cur||g.winner)return g;
  const inWar=g.tp.length>0, consumed=inWar?3:1;
  const cpCards=inWar?[...g.wfp,g.cur.p]:[g.cur.p];
  const coCards=inWar?[...g.wfo,g.cur.o]:[g.cur.o];
  const npp=g.pp.slice(consumed), nop=g.op.slice(consumed);
  const pile=[...g.tp,...cpCards,...coCards];
  const ps=getCardStrength(g.cur.p)+(g.pBuff?1:0)+(g.pManualBuff?1:0), os=getCardStrength(g.cur.o)+(g.oBuff?1:0)+(g.oManualBuff?1:0);
  let fp=npp, fo=nop, nt=[];
  let pPts=g.pPts, oPts=g.oPts, lp=0;
  const rd=g.round+1;
  if(ps>os){ fp=[...npp,...pile]; pPts+=pile.length; lp=pile.length; }
  else if(os>ps){ fo=[...nop,...pile]; oPts+=pile.length; lp=pile.length; }
  else if(rd>=MAX_ROUNDS){ nt=[]; }
  else nt=pile;
  let w=null;
  if(!fp.length&&!fo.length)w="tie";
  else if(!fp.length)w="opponent";
  else if(!fo.length)w="player";
  else if(rd>=MAX_ROUNDS)w=pPts>oPts?"player":oPts>pPts?"opponent":"tie";
  return{pp:fp,op:fo,tp:nt,cur:g.cur,reveal:false,round:rd,winner:w,wfp:[],wfo:[],pPts,oPts,lastPtsWon:lp,pCharges:g.pCharges,pManualBuff:false,oCharges:g.oCharges,oManualBuff:false,pPeeks:g.pPeeks,pPeeking:false};
}

    if(waxRef.current) return true;
    // Primary: use the bridge reference set by the non-Babel script
    var Cls = window.__WaxJSClass;
    // Fallback: try direct global access
    if(!Cls && typeof waxjs !== "undefined") Cls = waxjs.WaxJS || waxjs.default?.WaxJS || waxjs.default;
    if(!Cls && typeof WaxJS !== "undefined") Cls = WaxJS;
    // Last resort: crawl the raw waxjs object for anything with a login method
    if(!Cls && window.__waxjsRaw){
      var raw = window.__waxjsRaw;
      var keys = Object.keys(raw);
      for(var k=0;k<keys.length;k++){
        var val = raw[keys[k]];
        if(val && val.prototype && val.prototype.login){ Cls=val; break; }
      }
    }
    if(Cls){
      try{
        waxRef.current = new Cls({ rpcEndpoint: WAX_CONFIG.rpcEndpoint, tryAutoLogin: false });
        return true;
      }catch(e){ console.error("[WaxJS] Init error:",e); }
    }
    return false;
  }

    if(tryInitWax()) return;
    // CDN might still be loading via fallback chain — retry a few times
    let attempts = 0;
    const interval = setInterval(()=>{
      attempts++;
      if(tryInitWax() || attempts > 10) clearInterval(interval);
    }, 500);
    return ()=> clearInterval(interval);
  },[]);

    const check = ()=>{

        try {
          const avail = await waxRef.current.isAutoLoginAvailable();
          if(avail){ setWalletType("wcw"); setWalletAccount(waxRef.current.userAccount); }
        } catch(e){}
      })();
    };
    // Slight delay to let init finish
    const t = setTimeout(check, 1500);
    return ()=> clearTimeout(t);
  },[]);

  useEffect(()=>{
    if(!walletAccount){
      setOwnedCards([]);
      setDeck([]);

            <div style={{padding:16,background:"rgba(99,102,241,0.08)",border:"1px solid rgba(129,140,248,0.3)",borderRadius:16}}>
              <div style={{fontSize:20,fontWeight:700,color:"#a5b4fc",marginBottom:8}}>Trigger Power</div>
              <button className="btn" onClick={triggerPower} disabled={!game||game.winner||game.reveal||game.pManualBuff||game.pCharges<=0} style={{background:game.pManualBuff?"#059669":game.pCharges>0?"#6366f1":"#334155",color:"white",fontSize:18,padding:"10px 20px",marginBottom:10}}>{game.pManualBuff?"Activated!":game.pCharges>0?"Boost +1 STR":"No charges"}</button>
              <div style={{display:"flex",justifyContent:"center",gap:6,marginTop:4}}>
                {Array.from({length:MAX_CHARGES}).map((_,i)=><span key={i} style={{fontSize:22}}>{i<game.pCharges?"\u2705":"\u274C"}</span>)}
              </div>
            </div>
            <div style={{padding:16,background:"rgba(34,211,238,0.08)",border:"1px solid rgba(34,211,238,0.3)",borderRadius:16}}>
              <div style={{fontSize:20,fontWeight:700,color:"#67e8f9",marginBottom:8}}>Peek</div>
              <button className="btn" onClick={peek} disabled={!game||game.winner||game.reveal||game.pPeeking||game.pPeeks<=0||isWar} style={{background:isWar?"#334155":game.pPeeking?"#059669":game.pPeeks>0?"#0891b2":"#334155",color:"white",fontSize:18,padding:"10px 20px",marginBottom:10}}>{isWar?"No peek in WAR":game.pPeeking?"Peeking!":game.pPeeks>0?"Reveal Opponent":"No peeks"}</button>
              <div style={{display:"flex",justifyContent:"center",gap:6,marginTop:4}}>
                {Array.from({length:MAX_CHARGES}).map((_,i)=><span key={i} style={{fontSize:22}}>{i<game.pPeeks?"\u2705":"\u274C"}</span>)}
              </div>
            </div>
            <div style={{padding:16,background:"rgba(244,63,94,0.08)",border:"1px solid rgba(244,63,94,0.3)",borderRadius:16}}>
              <div style={{fontSize:20,fontWeight:700,color:"#fda4af",marginBottom:8}}>Opponent Buffs</div>
              <div style={{fontSize:18,color:"#94a3b8",padding:"10px 0",marginBottom:10}}>{game.oCharges} remaining</div>
              <div style={{display:"flex",justifyContent:"center",gap:6,marginTop:4}}>
                {Array.from({length:MAX_CHARGES}).map((_,i)=><span key={i} style={{fontSize:22}}>{i<game.oCharges?"\u2705":"\u274C"}</span>)}
              </div>
            </div>
          </div>}
          {isWar&&<div className="war-banner" style={{marginBottom:12}}>WAR! Three cards go down each. The third card decides the pile.</div>}
          {roundResult}
          {game?.winner&&<div className="win-text" style={{marginTop:8}}>
  {game.winner==="player"?"You Win!":game.winner==="opponent"?"Opponent Wins!":"It's a Draw!"}
  <div style={{fontSize:24,fontWeight:400,color:"#94a3b8",marginTop:6}}>Final Score: You {game.pPts} - {game.oPts} Opponent{game.round>=MAX_ROUNDS?" (Round limit reached)":" (All cards captured)"}</div>
</div>}
        </div>
        <div className="grid-2">
          <FlipCard card={game?.cur?.p} facedown={!game?.reveal} label={isWar?"Your deciding card":"Your card"} warFD={game?.reveal?game?.wfp||[]:[]} buffed={game?.reveal&&game?.pBuff} manualBuff={game?.reveal&&game?.pManualBuff}/>
          {(()=>{
            const isPeeking=game?.pPeeking&&!game?.reveal;
            const peekCard=isPeeking?((game?.tp?.length>0)?game?.op?.[2]:game?.op?.[0]):null;
            if(peekCard)return <FlipCard card={peekCard} facedown={false} label="Peeking at opponent's next card"/>;
            return <FlipCard card={game?.cur?.o} facedown={!game?.reveal} label={isWar?"Opponent's deciding card":"Opponent's card"} warFD={game?.reveal?game?.wfo||[]:[]} buffed={game?.reveal&&game?.oBuff} manualBuff={game?.reveal&&game?.oManualBuff}/>;
          })()}
        </div>
      </div>}

      {/* ═══════════ COLLECTION TAB ═══════════ */}
      {tab==="collection"&&<div className="space">
        <div className="ui-card">
          <div className="ui-card-title">Deck Builder</div>
          <div className="flex-wrap mb-4">
            <button className="btn btn-primary" onClick={()=>setDeck(buildDeck(ownedCards))}>Build Deck</button>
            <span className="text-sm text-slate">One click to build the largest legal deck.</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:18,color:"#94a3b8",marginBottom:6}}>
            <span>{deck.length}/{DECK_SIZE} cards</span><span>{fill}%</span>
          </div>
          <div className="progress-track"><div className="progress-fill" style={{width:fill+"%"}}/></div>
          <div className="grid-5 mt-3">
            {Object.keys(RARITY_CAPS).map(r=>{const bc=BUFF_CHANCE[r]||0;return <div key={r} className="rarity-cap-box" onClick={()=>toggleRarityFilter(r)} style={{cursor:"pointer",opacity:rarityFilter[r]?1:0.35,transition:"opacity 0.2s"}}><span className={`badge badge-${r}`} style={{fontSize:15}}>{titleCase(r)}</span><div className="text-xs mt-2">{dc[r]}/{RARITY_CAPS[r]}</div>{bc>0&&<div style={{fontSize:13,color:"#4ade80",marginTop:4}}>{Math.round(bc*100)}% chance +1 STR</div>}</div>})}
          </div>
        </div>
        <div className="ui-card" style={{marginBottom:16}}>
          <div className="ui-card-title">Hero Checklist ({deck.length}/{DECK_SIZE})</div>
          {(()=>{
            const deckHeroes=new Set(deck.map(c=>getHeroKey(c)));
            const ownedHeroes=new Set(ownedCards.map(c=>getHeroKey(c)));
            // Build merged hero list: use actual card names where available, fill gaps from master list
            const seen=new Map(); // normalizedKey -> display name
            ownedCards.forEach(c=>{ const k=getHeroKey(c); if(!seen.has(k)) seen.set(k, c.name); });
            ALL_HEROES.forEach(name=>{ const k=normalizeHeroName(name); if(!seen.has(k)) seen.set(k, name); });
            const heroList=[...seen.entries()].sort((a,b)=>a[1].localeCompare(b[1]));
            const cols=5, rows=Math.ceil(heroList.length/5);
            const colArrays=[];
            for(let col=0;col<cols;col++) colArrays.push(heroList.slice(col*rows,(col+1)*rows));
            return(
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:4,fontSize:16}}>
                {colArrays.map((col,ci)=>
                  <div key={ci} style={{display:"flex",flexDirection:"column",gap:2}}>
                    {col.map(([key,name])=>{
                      const inDeck=deckHeroes.has(key);
                      const owned=ownedHeroes.has(key);
                      const marketUrl="https://heroes.atomichub.io/market?blockchain=wax-mainnet&collection_name=officialhero&order=asc&primary_chain=wax-mainnet&schema_name=series1&sort=price&symbol=WAX&search="+encodeURIComponent(name);
                      return(
                        <div key={key} style={{display:"flex",alignItems:"center",gap:4,padding:"2px 0",color:inDeck?"#4ade80":"#ef4444"}}>
                          <span style={{fontSize:17,lineHeight:1}}>{inDeck?"✓":"✗"}</span>
                          {!owned?(
                            <a href={marketUrl} target="_blank" rel="noopener noreferrer" style={{color:"#ef4444",fontSize:15,textDecoration:"underline",textDecorationStyle:"dotted",opacity:0.8}}>{name}</a>
                          ):(
                            <span style={{color:inDeck?"#e2e8f0":"#64748b",fontSize:15}}>{name}</span>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })()}
        </div>
        <div className="text-sm text-slate mb-4" style={{marginBottom:16}}>
          {demoMode
            ? `Demo Mode: Showing all ${ownedCards.length} cards (50 heroes x 5 rarities).`
            : isConnected
            ? `Showing ${ownedCards.length} cards from ${walletAccount}'s inventory.`
            : "Connect your WAX wallet to load your cards and build a deck."}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {groupCardsByHero(ownedCards).filter(([,variants])=>variants.some(c=>rarityFilter[c.rarity])).map(([heroKey, variants])=>{
            const selectedVariant=variants.find(c=>deck.some(d=>d.id===c.id));
            const heroImg=variants[0]?.img;
            return(
              <div key={heroKey} className={`collection-card ${selectedVariant?"in-deck-"+selectedVariant.rarity:""}`} style={{padding:16}}>
                <div style={{display:"flex",gap:16,alignItems:"flex-start"}}>
                  {heroImg && <div style={{flexShrink:0,width:80,height:100,borderRadius:10,overflow:"hidden",background:"rgba(0,0,0,0.2)",padding:4}}>
                    <img src={buildImageUrl(heroImg)} alt={variants[0].name} style={{width:"100%",height:"100%",objectFit:"contain",borderRadius:8}} onError={(e)=>{e.target.style.display="none"}} />
                  </div>}
                  <div style={{flex:1}}>
                    <div style={{fontSize:22,fontWeight:700,marginBottom:8,color:selectedVariant?undefined:"#94a3b8"}}>
                      {variants[0].name}
                      {selectedVariant&&<span className={`badge badge-${selectedVariant.rarity}`} style={{marginLeft:8,fontSize:15}}>{titleCase(selectedVariant.rarity)} selected</span>}
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                      {variants.map(card=>{
                        const inDeck=deck.some(c=>c.id===card.id);
                        const otherSelected=selectedVariant&&!inDeck;
                        const ok=canAdd(card,deck);
                        return(
                          <button key={card.id}
                            className={`btn btn-sm ${inDeck?"btn-secondary":""}`}
                            style={{
                              display:"flex",alignItems:"center",gap:6,padding:"6px 12px",
                              opacity:otherSelected?0.35:1,
                              border:inDeck?"2px solid #fde68a":"1px solid rgba(255,255,255,0.1)",
                              background:inDeck?"rgba(253,230,138,0.15)":"rgba(255,255,255,0.05)",
                            }}
                            onClick={()=>toggleCard(card)}
                            disabled={!inDeck&&!ok}
                          >
                            <span className={`badge badge-${card.rarity}`} style={{fontSize:14}}>{titleCase(card.rarity)}</span>
                            <span style={{fontSize:16,color:"#e2e8f0"}}>STR: {getCardStrength(card)}</span>
                            <span style={{fontSize:15,color:inDeck?"#fde68a":"#64748b"}}>{inDeck?"✓":""}</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>}

      {/* ═══════════ POWERS TAB ═══════════ */}
      {/* Power Registry tab content — hidden but preserved for future ability system */}
      {tab==="powers"&&<div className="space">
        <div className="ui-card">
          <div className="ui-card-title">Power Registry</div>
          <div className="text-sm text-slate mb-4">Shows which heroes have powers and whether the power came from a template match or name-based fallback.</div>
          <div className="grid-3">
            {ownedCards.map(card=>{
              const powerName=getHeroPowerName(card);
              const chance=BUFF_CHANCE[card.rarity]||0;
              return(
                <div key={card.id} className="collection-card">
                  {card.img && <div style={{marginBottom:10,borderRadius:12,overflow:"hidden",background:"rgba(0,0,0,0.2)",padding:8}}>
                    <img src={buildImageUrl(card.img)} alt={card.name} style={{width:"100%",height:100,objectFit:"contain",borderRadius:8}} onError={(e)=>{e.target.style.display="none"}} />
                  </div>}
                  <div className={`name-${card.rarity}`} style={{fontSize:22,fontWeight:700}}>{card.name}</div>
                  <div className="flex-wrap mt-2 gap-2">
                    <span className={`badge badge-${card.rarity}`}>{titleCase(card.rarity)}</span>
                    <span className="badge badge-outline">STR: {getCardStrength(card)}</span>
                  </div>
                  {powerName?(<div className="power-box mt-3"><div style={{fontWeight:600}}>{powerName}</div><div className="text-xs mt-2">{chance>0?`${Math.round(chance*100)}% chance for +1 STR`:"No buff effect"}</div></div>)
                  :(<div className="no-power-box mt-3 text-sm">No power assigned.</div>)}
                </div>
              );
            })}
          </div>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
