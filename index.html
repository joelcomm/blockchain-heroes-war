<style>

  }

  }
  .tabs-list { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 4px; margin: 20px 0; }
  .tab-btn { padding: 12px; border: none; border-radius: 12px; background: transparent; color: #94a3b8; font-weight: 600; cursor: pointer; font-size: 20px; transition: all 0.2s; }

  .ui-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 24px; margin-bottom: 20px; backdrop-filter: blur(12px); }
  .ui-card-title { font-size: 28px; font-weight: 700; margin-bottom: 16px; }
  .btn { padding: 12px 24px; border: none; border-radius: 12px; font-weight: 600; font-size: 20px; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 8px; }
  .btn-primary { background: #6366f1; color: white; }
  .btn-primary:hover { background: #818cf8; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-wallet { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
  .btn-wallet:hover { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
  .btn-wallet.connected { background: linear-gradient(135deg, #10b981, #059669); }
  .btn-wallet.connected:hover { background: linear-gradient(135deg, #34d399, #10b981); }
  .btn-wallet:disabled { opacity: 0.6; cursor: wait; }
  .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #cbd5e1; }
  .btn-outline:hover { background: rgba(255,255,255,0.08); }
  .btn-outline.active-btn { background: #6366f1; color: white; border-color: #6366f1; }
  .btn-secondary { background: rgba(255,255,255,0.1); color: #e2e8f0; }
  .btn-secondary:hover { background: rgba(255,255,255,0.18); }
  .btn-sm { padding: 10px 16px; font-size: 18px; }
  .badge { display: inline-flex; padding: 5px 14px; border-radius: 9999px; font-size: 18px; font-weight: 600; border: 1px solid; }
  .badge-legendary { background: rgba(251,191,36,0.2); color: #fde68a; border-color: rgba(251,191,36,0.4); }
  .badge-epic { background: rgba(168,85,247,0.2); color: #d8b4fe; border-color: rgba(168,85,247,0.4); }
  .badge-rare { background: rgba(34,211,238,0.2); color: #a5f3fc; border-color: rgba(34,211,238,0.4); }
  .badge-uncommon { background: rgba(52,211,153,0.2); color: #a7f3d0; border-color: rgba(52,211,153,0.4); }
  .badge-common { background: rgba(148,163,184,0.2); color: #cbd5e1; border-color: rgba(148,163,184,0.4); }
  .badge-str { background: rgba(255,255,255,0.1); color: white; border-color: rgba(255,255,255,0.2); }
  .badge-power { background: rgba(251,191,36,0.2); color: #fde68a; border-color: rgba(251,191,36,0.3); box-shadow: 0 0 18px rgba(251,191,36,0.18); }
  .badge-outline { background: transparent; color: #94a3b8; border-color: rgba(255,255,255,0.2); }
  .badge-demo { background: rgba(232,121,249,0.15); color: #f0abfc; border-color: rgba(232,121,249,0.3); }
  .badge-live { background: rgba(16,185,129,0.15); color: #6ee7b7; border-color: rgba(16,185,129,0.3); }
  .progress-track { height: 12px; background: rgba(255,255,255,0.1); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 999px; background: linear-gradient(to right, #6366f1, #818cf8); transition: width 0.4s; }
  .score-track { height: 14px; background: rgba(232,121,249,0.3); border-radius: 999px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 999px; background: linear-gradient(to right, #22d3ee, #67e8f9); transition: width 0.5s; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .flex-wrap { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .w-full { width: 100%; }
  .text-sm { font-size: 20px; }
  .text-xs { font-size: 18px; }
  .text-center { text-align: center; }
  .text-slate { color: #94a3b8; }
  .mt-2 { margin-top: 8px; }
  .mt-3 { margin-top: 12px; }
  .mb-4 { margin-bottom: 16px; }
  .gap-2 { gap: 8px; }
  .space-y > * + * { margin-top: 16px; }
  .flip-container { perspective: 1200px; }
  .flip-inner {
    position: relative; width: 100%; height: 380px;
    transition: transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
    transform-style: preserve-3d;
    border-radius: 16px; border: 1px solid rgba(255,255,255,0.15);
  }
  .flip-inner.flipped { transform: rotateY(180deg); }
  .flip-face {
    position: absolute; inset: 0;
    backface-visibility: hidden; border-radius: 16px; overflow: hidden;
  }
  .flip-back { transform: rotateY(180deg); padding: 20px; display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.5); }
  .flip-inner img.card-back { width: 100%; height: 100%; object-fit: contain; background: #000; border-radius: 16px; }
  .glow-legendary { box-shadow: 0 0 40px rgba(251,191,36,0.35); border-color: rgba(251,191,36,0.5); background: linear-gradient(135deg, rgba(251,191,36,0.15), rgba(0,0,0,0.3)); }
  .glow-epic { box-shadow: 0 0 35px rgba(168,85,247,0.32); border-color: rgba(168,85,247,0.5); background: linear-gradient(135deg, rgba(168,85,247,0.15), rgba(0,0,0,0.3)); }
  .glow-rare { box-shadow: 0 0 28px rgba(34,211,238,0.26); border-color: rgba(34,211,238,0.5); background: linear-gradient(135deg, rgba(34,211,238,0.15), rgba(0,0,0,0.3)); }
  .glow-uncommon { box-shadow: 0 0 18px rgba(52,211,153,0.22); border-color: rgba(52,211,153,0.4); background: linear-gradient(135deg, rgba(52,211,153,0.15), rgba(0,0,0,0.3)); }
  .glow-common { box-shadow: 0 0 12px rgba(148,163,184,0.15); border-color: rgba(148,163,184,0.3); background: linear-gradient(135deg, rgba(148,163,184,0.1), rgba(0,0,0,0.3)); }
  .str-circle {
    width: 100px; height: 100px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 50px; font-weight: 900; color: white; margin: 16px auto;
  }
  .str-legendary { border-color: rgba(251,191,36,0.6); box-shadow: 0 0 30px rgba(251,191,36,0.25); background: rgba(251,191,36,0.1); }
  .str-epic { border-color: rgba(168,85,247,0.6); box-shadow: 0 0 30px rgba(168,85,247,0.25); background: rgba(168,85,247,0.1); }
  .str-rare { border-color: rgba(34,211,238,0.6); box-shadow: 0 0 30px rgba(34,211,238,0.25); background: rgba(34,211,238,0.1); }
  .str-uncommon { border-color: rgba(52,211,153,0.6); box-shadow: 0 0 30px rgba(52,211,153,0.2); background: rgba(52,211,153,0.1); }
  .str-common { border-color: rgba(148,163,184,0.4); box-shadow: 0 0 15px rgba(148,163,184,0.1); background: rgba(148,163,184,0.08); }
  .name-legendary { color: #fbbf24; }
  .name-epic { color: #c084fc; }
  .name-rare { color: #22d3ee; }
  .name-uncommon { color: #34d399; }
  .name-common { color: #94a3b8; }
  .war-banner { background: rgba(244,63,94,0.1); border: 1px solid rgba(251,113,133,0.3); border-radius: 16px; padding: 14px 18px; text-align: center; font-weight: 600; font-size: 22px; color: #fecdd3; animation: pulse-glow 1.2s ease-in-out infinite; }
  @keyframes pulse-glow { 0%,100%{opacity:1} 50%{opacity:0.7} }
  .win-text { font-size: 38px; font-weight: 800; color: #fde68a; animation: winGlow 1.5s ease-in-out infinite; }
  @keyframes winGlow { 0%,100%{text-shadow:0 0 20px rgba(251,191,36,0.4)} 50%{text-shadow:0 0 40px rgba(251,191,36,0.8)} }
  .result-win { color: #6ee7b7; font-weight: 700; font-size: 26px; }
  .result-lose { color: #fda4af; font-weight: 700; font-size: 26px; }
  .result-tie { color: #fde68a; font-weight: 700; font-size: 26px; }
  @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .slide-up { animation: slideUp 0.35s ease-out; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }

  /* ═══════════ BATTLE EFFECTS ═══════════ */
  /* Card reveal glow bursts */
  @keyframes glowBurstGold { 0%{box-shadow:0 0 0 rgba(251,191,36,0)} 30%{box-shadow:0 0 60px 20px rgba(251,191,36,0.6)} 100%{box-shadow:0 0 40px rgba(251,191,36,0.35)} }
  @keyframes glowBurstRed { 0%{box-shadow:0 0 0 rgba(239,68,68,0)} 30%{box-shadow:0 0 60px 20px rgba(239,68,68,0.5)} 100%{box-shadow:0 0 20px rgba(239,68,68,0.15)} }
  @keyframes glowBurstWhite { 0%{box-shadow:0 0 0 rgba(255,255,255,0)} 30%{box-shadow:0 0 50px 15px rgba(255,255,255,0.5)} 100%{box-shadow:0 0 15px rgba(255,255,255,0.1)} }
  .glow-burst-win { animation: glowBurstGold 600ms ease-out forwards; }
  .glow-burst-lose { animation: glowBurstRed 600ms ease-out forwards; }
  .glow-burst-tie { animation: glowBurstWhite 600ms ease-out forwards; }

  /* Rarity shimmer — legendary traveling light, epic subtle pulse */
  @keyframes legendaryShimmer { 0%{left:-100%} 100%{left:200%} }
  .shimmer-legendary .flip-back { position: relative; overflow: hidden; }
  .shimmer-legendary .flip-back::after { content:''; position:absolute; top:0; left:-100%; width:50%; height:100%; background:linear-gradient(90deg,transparent,rgba(251,191,36,0.25),transparent); animation:legendaryShimmer 2.5s ease-in-out infinite; pointer-events:none; z-index:10; }
  @keyframes epicPulse { 0%,100%{box-shadow:0 0 35px rgba(168,85,247,0.32)} 50%{box-shadow:0 0 55px rgba(168,85,247,0.55)} }
  .shimmer-epic { animation: epicPulse 2s ease-in-out infinite; }

  /* Win/lose card reactions — applied to container, not flip-inner, to avoid transform conflicts */
  @keyframes cardWinPop { 0%{transform:scale(1)} 50%{transform:scale(1.07)} 100%{transform:scale(1.04)} }
  @keyframes cardLoseShrink { 0%{transform:scale(1);opacity:1} 100%{transform:scale(0.94);opacity:0.55} }
  .card-reaction-win { animation: cardWinPop 500ms ease-out forwards; }
  .card-reaction-lose { animation: cardLoseShrink 400ms ease-out forwards; }

  /* Trigger Power — electric crackle border */
  @keyframes electricPulse { 0%,100%{box-shadow:0 0 10px rgba(99,102,241,0.3),inset 0 0 10px rgba(99,102,241,0.1);border-color:rgba(129,140,248,0.5)} 25%{box-shadow:0 0 25px rgba(99,102,241,0.7),inset 0 0 15px rgba(99,102,241,0.3);border-color:rgba(129,140,248,1)} 50%{box-shadow:0 0 8px rgba(99,102,241,0.2);border-color:rgba(129,140,248,0.3)} 75%{box-shadow:0 0 30px rgba(99,102,241,0.8),inset 0 0 20px rgba(99,102,241,0.4);border-color:rgba(167,139,250,1)} }
  .fx-trigger-power { animation: electricPulse 800ms ease-in-out infinite; border:2px solid rgba(129,140,248,0.8); }

  /* Counter-Strike — red lightning flash overlay */
  @keyframes counterFlash { 0%{opacity:0} 15%{opacity:1;background:rgba(239,68,68,0.3)} 30%{opacity:0} 45%{opacity:1;background:rgba(239,68,68,0.2)} 60%{opacity:0} 75%{opacity:0.6;background:rgba(239,68,68,0.15)} 100%{opacity:0} }
  .fx-counter-strike { position:absolute; inset:0; z-index:20; pointer-events:none; border-radius:16px; animation:counterFlash 700ms ease-out forwards; }

  /* Shield barrier — translucent dome */
  @keyframes shieldBarrier { 0%{opacity:0;transform:scaleY(0.5)} 20%{opacity:0.8;transform:scaleY(1)} 80%{opacity:0.6;transform:scaleY(1)} 100%{opacity:0;transform:scaleY(1)} }
  .fx-shield { position:absolute; inset:0; z-index:20; pointer-events:none; border-radius:16px; background:linear-gradient(180deg,rgba(34,211,238,0.25),rgba(34,211,238,0.05)); border:2px solid rgba(34,211,238,0.5); animation:shieldBarrier 1.2s ease-out forwards; }

  /* Double Down — golden pulse */
  @keyframes doubleDownPulse { 0%,100%{box-shadow:0 0 20px rgba(251,191,36,0.2)} 50%{box-shadow:0 0 50px rgba(251,191,36,0.6),0 0 100px rgba(251,191,36,0.2)} }
  .fx-double-down { animation: doubleDownPulse 1s ease-in-out infinite; }

  /* Peek — ripple/eye-opening reveal */
  @keyframes peekRipple { 0%{clip-path:ellipse(0% 0% at 50% 50%);opacity:0} 50%{clip-path:ellipse(60% 50% at 50% 50%);opacity:1} 100%{clip-path:ellipse(100% 100% at 50% 50%);opacity:1} }
  .fx-peek .flip-back { animation: peekRipple 600ms ease-out forwards; }

  /* WAR — screen shake */
  @keyframes screenShake { 0%,100%{transform:translateX(0)} 10%{transform:translateX(-6px) translateY(2px)} 20%{transform:translateX(5px) translateY(-3px)} 30%{transform:translateX(-4px) translateY(1px)} 40%{transform:translateX(6px) translateY(-2px)} 50%{transform:translateX(-3px) translateY(3px)} 60%{transform:translateX(4px)} 70%{transform:translateX(-2px)} 80%{transform:translateX(3px)} 90%{transform:translateX(-1px)} }
  .fx-screen-shake { animation: screenShake 500ms ease-out; }

  /* WAR banner slam-in */
  @keyframes bannerSlam { 0%{transform:scale(3) rotate(-5deg);opacity:0} 50%{transform:scale(1.1) rotate(1deg);opacity:1} 70%{transform:scale(0.95) rotate(0deg)} 100%{transform:scale(1) rotate(0deg);opacity:1} }
  .war-banner.fx-banner-slam { animation: bannerSlam 600ms cubic-bezier(0.22,1,0.36,1) forwards, pulse-glow 1.2s ease-in-out infinite 600ms; }

  /* WAR facedown fan-out stagger */
  .war-facedown.fx-fan-out img { opacity:0; animation: slideUp 300ms ease-out forwards; }
  .war-facedown.fx-fan-out img:nth-child(1) { animation-delay:0ms; }
  .war-facedown.fx-fan-out img:nth-child(2) { animation-delay:150ms; }
  .war-facedown.fx-fan-out img:nth-child(3) { animation-delay:300ms; }

  /* Floating points — drift up and fade */
  @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 70%{opacity:0.8;transform:translateY(-60px) scale(1.1)} 100%{opacity:0;transform:translateY(-90px) scale(0.9)} }
  .float-pts { position:absolute; font-size:32px; font-weight:900; pointer-events:none; z-index:30; animation:floatUp 1.2s ease-out forwards; text-shadow:0 2px 8px rgba(0,0,0,0.5); }
  .float-pts.pts-win { color:#4ade80; }
  .float-pts.pts-lose { color:#f87171; }
  .float-pts.pts-tie { color:#fde68a; }

  /* Score bar flash */
  @keyframes scoreFlash { 0%{filter:brightness(1)} 50%{filter:brightness(2.5)} 100%{filter:brightness(1)} }
  .score-fill.fx-score-flash { animation: scoreFlash 400ms ease-out; }

  /* Confetti */
  @keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
  .confetti-container { position:fixed; inset:0; pointer-events:none; z-index:100; overflow:hidden; }
  .confetti-piece { position:absolute; border-radius:2px; animation:confettiFall var(--fall-duration,3s) linear forwards; animation-delay:var(--fall-delay,0s); left:var(--fall-x,50%); opacity:0.9; }

  /* Winner — dramatic final card zoom (on container to avoid transform conflict) */
  @keyframes dramaticZoom { 0%{transform:scale(1)} 100%{transform:scale(1.08)} }
  .fx-final-zoom { animation: dramaticZoom 2s ease-in-out forwards; }

  /* End-game splash graphic — zooms in then fades out */
  @keyframes endgameSplash {
    0%   { transform:scale(0.1) rotate(-8deg); opacity:0; }
    15%  { transform:scale(1.15) rotate(2deg); opacity:1; }
    25%  { transform:scale(1.0) rotate(0deg); opacity:1; }
    75%  { transform:scale(1.0) rotate(0deg); opacity:1; }
    100% { transform:scale(1.1) rotate(0deg); opacity:0; }
  }
  .endgame-splash {
    position:fixed; inset:0; z-index:90; display:flex; align-items:center; justify-content:center;
    pointer-events:none; background:rgba(0,0,0,0.4);
    animation: endgameSplash 3s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  .endgame-splash img {
    max-width:70vw; max-height:60vh; object-fit:contain;
    filter:drop-shadow(0 0 60px rgba(251,191,36,0.5)) drop-shadow(0 0 120px rgba(251,191,36,0.3));
  }

  /* Villain selector panel */
  .villain-panel { margin-bottom:16px; }
  .villain-panel-title { font-size:26px; font-weight:900; color:#f1f5f9; text-align:center; margin-bottom:12px; text-transform:uppercase; letter-spacing:2px; }
  .villain-grid { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
  .villain-card {
    cursor:pointer; padding:10px; border-radius:16px;
    border:2px solid rgba(255,255,255,0.1);
    background:rgba(255,255,255,0.03);
    transition:all 0.25s ease; text-align:center;
    display:flex; flex-direction:column; align-items:center;
    width:calc(20% - 10px); min-width:0;
    box-sizing:border-box;
  }
  .villain-card:hover { transform:translateY(-6px); box-shadow:0 12px 32px rgba(0,0,0,0.5); }
  .villain-card.selected { box-shadow:0 0 24px rgba(255,255,255,0.15); }
  .villain-card img { width:100%; aspect-ratio:3/4; object-fit:cover; border-radius:10px; margin-bottom:6px; }
  .villain-card .v-name { font-size:15px; font-weight:800; line-height:1.2; }
  .villain-card .v-subtitle { font-size:11px; color:#94a3b8; margin-top:1px; }
  .villain-card .v-stars { font-size:14px; color:#fbbf24; letter-spacing:1px; margin:3px 0; }
  .villain-card .v-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; opacity:0.8; }
  .villain-card .v-ability { font-size:13px; font-weight:700; margin-top:3px; }
  .villain-card .v-desc { font-size:11px; color:#94a3b8; line-height:1.3; margin-top:2px; }

  /* Tablet: 3 per row */
  @media (max-width: 740px) {
    .villain-card { width:calc(33.333% - 8px); }
    .villain-card .v-name { font-size:16px; }
    .villain-card .v-ability { font-size:14px; }
  }
  /* Phone: 2 per row */
  @media (max-width: 480px) {
    .villain-card { width:calc(50% - 6px); }
  }

  /* Mobile adjustments for effects */
  @media (max-width: 640px) {
    .float-pts { font-size:24px; }
    .confetti-piece { width:7px!important; height:5px!important; }
  }

  .war-facedown { display: flex; justify-content: center; gap: 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 12px; }
  .war-facedown img { height: 100px; width: 70px; object-fit: contain; border-radius: 10px; background: #000; }

function buildDeck(pool){
  // Group cards by hero, one variant per hero
  const groups=new Map();
  pool.forEach(c=>{ const k=getHeroKey(c); if(!groups.has(k))groups.set(k,[]); groups.get(k).push(c); });

  const heroList=[...groups.entries()]
    .map(([k,variants])=>{
      const rarities=[...new Set(variants.map(c=>c.rarity))].filter(r=>(RARITY_CAPS[r]||0)>0);
      return {key:k, variants, rarities};
    })
    .sort((a,b)=>a.rarities.length-b.rarities.length);

    if(available.length===0)continue;
    available.sort((a,b)=>RARITY_ORDER[b]-RARITY_ORDER[a]);

    const card=hero.variants.find(c=>c.rarity===bestRarity);

  // Second pass: any heroes that got skipped, try again with updated caps
  for(const hero of heroList){
    if(picks.size>=DECK_SIZE)break;
    if(picks.has(hero.key))continue;
    const available=hero.rarities.filter(r=>rc[r]<RARITY_CAPS[r]);
    if(available.length===0)continue;
    available.sort((a,b)=>RARITY_ORDER[b]-RARITY_ORDER[a]);
    const card=hero.variants.find(c=>c.rarity===available[0]);
    if(card){ picks.set(hero.key, card); rc[card.rarity]++; }
  }

}
function createGame(pDeck,oDeck,cfg,villain){ return { cfg, villain, pp:shuffleArray(pDeck), op:shuffleArray(oDeck), tp:[], cur:null, reveal:false, round:0, winner:null, wfp:[], wfo:[], pPts:0, oPts:0, lastPtsWon:0, pCharges:cfg.charges, pManualBuff:false, oCharges:cfg.npcCharges||cfg.charges, oManualBuff:false, oCounterStrike:false, pPeeks:cfg.peeks, pPeeking:false, pDoubleDown:false, pDoubles:cfg.doubles, lastDoubleDown:false, oShields:cfg.shields, oShieldUsed:false, devoured:false, leeched:null }; }
function npcDecideBuff(g,pCard,oCard){
  if(g.oCharges<=0)return false;

  if(Math.random()>g.cfg.buffAccuracy)return false;
  const ps=getCardStrength(pCard)+(g.pManualBuff?1:0);
  const os=getCardStrength(oCard);

  if(os<ps&&ps-os<=1)return true;
  if(os===ps)return true;
  return false;
}
// Counter-Strike: NPC auto-counters when player uses Trigger Power (chance based on difficulty)
function npcCounterStrike(g){
  if(!g.pManualBuff)return false; // only triggers when player boosted

function npcDecideShield(g,ps,os,pile){

    if(g.cfg.shieldEffect==="block"){ lp=0; }
    else{ const halfPts=Math.floor(pile.length*ddMult/2); pPts+=halfPts; lp=halfPts; }
  } else if(ps>os){ fp=[...npp,...pile]; pPts+=pile.length*ddMult; lp=pile.length*ddMult; }
  else if(os>ps){
    fo=[...nop,...pile]; oPts+=pile.length*ddMult; lp=pile.length*ddMult;
    // Villain: Devour — steal 1 pt from player on opponent win
    if(vl?.devourChance && Math.random()<vl.devourChance && pPts>0){ pPts--; oPts++; devoured=true; }
    // Villain: Leech — drain 1 random player ability charge
    if(vl?.leechChance && Math.random()<vl.leechChance){
      const drainable=[]; if(pCharges>0)drainable.push("boost"); if(pPeeks>0)drainable.push("peek"); if(pDoubles>0)drainable.push("double");
      if(drainable.length>0){ const pick=drainable[Math.floor(Math.random()*drainable.length)]; if(pick==="boost")pCharges--; else if(pick==="peek")pPeeks--; else pDoubles--; leeched=pick; }
    }
  }
  else nt=pile;
  let w=null;
  if(!fp.length&&!fo.length)w="tie";
  else if(!fp.length)w="opponent";
  else if(!fo.length)w="player";
  else if(rd>=MAX_ROUNDS&&nt.length===0)w=pPts>oPts?"player":oPts>pPts?"opponent":"tie";
  return{cfg:g.cfg,villain:g.villain,pp:fp,op:fo,tp:nt,cur:g.cur,reveal:false,round:rd,winner:w,wfp:[],wfo:[],pPts,oPts,lastPtsWon:lp,pCharges,pManualBuff:false,oCharges:g.oCharges,oManualBuff:false,oCounterStrike:g.oCounterStrike,pPeeks,pPeeking:false,pDoubleDown:false,pDoubles,lastDoubleDown:g.pDoubleDown,oShields:g.oShields-(shieldUsed?1:0),oShieldUsed:shieldUsed,devoured,leeched};
}

function FlipCard({card,facedown,label,warFD=[],buffed=false,manualBuff=false,counterStrike=false,outcome=null,doubleDown=false,peeking=false,shieldUsed=false,isWinner=false,warActive=false,encrypted=false}){
  const r=card?.rarity||"common";
  const baseStr=getCardStrength(card);
  const totalBuff=(buffed?1:0)+(manualBuff?1:0);
  const displayStr=baseStr+totalBuff;
  const powerName=card?getHeroPowerName(card):null;
  const [imgLoaded,setImgLoaded]=useState(false);
  const imgUrl=card?buildImageUrl(card.img):null;
  // Reset loaded state when card changes
  useEffect(()=>{ setImgLoaded(false); },[imgUrl]);
  // Flip immediately when game says reveal — don't wait for image load
  const flipped=!facedown;
  const flipClasses=[
    "flip-inner",
    flipped?"flipped":"",
    flipped?"glow-"+r:"",
    flipped&&r==="legendary"?"shimmer-legendary":"",
    flipped&&r==="epic"?"shimmer-epic":"",
    outcome==="win"?"glow-burst-win":"",
    outcome==="lose"?"glow-burst-lose":"",
    outcome==="tie"?"glow-burst-tie":"",
    manualBuff&&!counterStrike?"fx-trigger-power":"",
    doubleDown?"fx-double-down":"",
  ].filter(Boolean).join(" ");
  return(
    <div className="slide-up">
      {label&&<div className="owner-label">{label}</div>}
      {warFD.length>0&&<div style={{marginBottom:10}}><div className="war-facedown-label">WAR face-down cards</div><div className={`war-facedown${warActive?" fx-fan-out":""}`}>{warFD.map((c,i)=><img key={i} src={CARD_BACK} alt="facedown"/>)}</div></div>}
      <div className={`flip-container${outcome==="win"?" card-reaction-win":""}${outcome==="lose"?" card-reaction-lose":""}${isWinner?" fx-final-zoom":""}`} style={{position:"relative"}}>
        {counterStrike&&<div className="fx-counter-strike"/>}
        {shieldUsed&&<div className="fx-shield"/>}
        <div className={flipClasses}>
          <div className="flip-face"><img className="card-back" src={CARD_BACK} alt="back"/></div>
          <div className={`flip-face flip-back${peeking?" fx-peek":""}`} style={{padding:8}}>
            {card?(<div style={{display:"flex",gap:24,width:"100%",height:"100%",alignItems:"center",padding:"0 8px"}}>
              {/* Left: full card image, fitted to show entire card */}
              <div style={{flex:"0 0 48%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",borderRadius:12,overflow:"hidden",background:"rgba(0,0,0,0.3)",position:"relative"}}>
                {!imgLoaded&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}><img src={CARD_BACK} alt="loading" style={{maxWidth:"100%",maxHeight:"100%",objectFit:"contain",borderRadius:10,opacity:0.5}}/></div>}
                <img src={imgUrl} alt={card.name} style={{maxWidth:"100%",maxHeight:"100%",objectFit:"contain",borderRadius:10,opacity:imgLoaded?1:0,transition:"opacity 0.2s"}} onLoad={()=>setImgLoaded(true)} onError={(e)=>{e.target.src=CARD_BACK;setImgLoaded(true);}} />
              </div>
              {/* Right: name, rarity, strength, power */}
              <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",gap:10,minWidth:0}}>
                <div className={`name-${r}`} style={{fontSize:30,fontWeight:800,lineHeight:1.2}}>{card.name}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  <span className={`badge badge-${r}`}>{titleCase(r)}</span>
                </div>
                <div className={`str-circle str-${r}`} style={{width:80,height:80,fontSize:36,margin:0}}>{encrypted?"?":displayStr}</div>
                <div style={{fontSize:18,color:"#94a3b8"}}>{encrypted?"STR: ???":`STR: ${displayStr}${totalBuff>0?` (${baseStr}+${totalBuff})`:""}`}</div>
                {!encrypted&&buffed&&powerName&&<div style={{fontSize:20,padding:"8px 12px",borderRadius:10,background:"rgba(74,222,128,0.15)",border:"2px solid rgba(74,222,128,0.5)",color:"#4ade80",fontWeight:700}}>{powerName}<br/><span style={{fontWeight:400,fontSize:17,opacity:0.9}}>Power activated! +1 STR</span></div>}
                {!encrypted&&manualBuff&&!counterStrike&&<div style={{fontSize:20,padding:"8px 12px",borderRadius:10,background:"rgba(99,102,241,0.15)",border:"2px solid rgba(129,140,248,0.5)",color:"#a5b4fc",fontWeight:700}}>Trigger Power!<br/><span style={{fontWeight:400,fontSize:17,opacity:0.9}}>Manual boost! +1 STR</span></div>}
                {!encrypted&&counterStrike&&<div style={{fontSize:20,padding:"8px 12px",borderRadius:10,background:"rgba(239,68,68,0.15)",border:"2px solid rgba(239,68,68,0.5)",color:"#f87171",fontWeight:700}}>⚡ Counter-Strike!<br/><span style={{fontWeight:400,fontSize:17,opacity:0.9}}>Countered your boost! +1 STR</span></div>}
                {encrypted&&<div style={{fontSize:18,padding:"8px 12px",borderRadius:10,background:"rgba(34,197,94,0.1)",border:"2px solid rgba(34,197,94,0.4)",color:"#22c55e",fontWeight:700}}>🔒 Encrypted<br/><span style={{fontWeight:400,fontSize:15,opacity:0.9}}>Strength hidden</span></div>}
                {!encrypted&&!buffed&&!manualBuff&&powerName&&<div style={{fontSize:16,color:"#64748b"}}>{powerName}</div>}
                <div style={{fontSize:14,color:"#64748b"}}>#{card.templateId}</div>

        </div>

  );
}

const CONFETTI_COLORS=['#fbbf24','#f87171','#4ade80','#67e8f9','#a78bfa','#f0abfc','#fde68a','#60a5fa'];

  // ═══════════ SFX SOUND SYSTEM ═══════════
  const sfxCacheRef=useRef({});

    try{
      // Reuse cached Audio objects for rapid repeated play
      const key="sounds/"+name+".mp3";
      let a=sfxCacheRef.current[key];
      if(a){ a.currentTime=0; a.volume=volume; a.play().catch(()=>{}); }
      else{ a=new Audio(key); a.volume=volume; sfxCacheRef.current[key]=a; a.play().catch(()=>{}); }
    }catch(e){}
  };
  // Preload all SFX on first mount
  useEffect(()=>{
    const names=["card-flip","war-declared","victory","loss","battle-victory","battle-loss","ability-trigger","counter-strike","shield-block","peek","double-down","devour","leech","fud","encrypt","overwhelm"];
    names.forEach(n=>{ try{ const a=new Audio("sounds/"+n+".mp3"); a.preload="auto"; sfxCacheRef.current["sounds/"+n+".mp3"]=a; }catch(e){} });
  },[]);

  // ═══════════ BACKGROUND MUSIC SYSTEM ═══════════
  const pregameMusicRef=useRef(null);
  const gameplayMusicRef=useRef(null);
  const musicStartedRef=useRef(false);
  const [musicMuted,setMusicMuted]=useState(()=>{ try{ return localStorage.getItem("bh_war_music_muted")==="true"; }catch(e){ return false; } });
  const MUSIC_VOLUME=0.25;

  // Initialize audio objects once and attempt autoplay
  useEffect(()=>{
    const pg=new Audio("sounds/pregame-audio.mp3");
    pg.loop=true; pg.volume=MUSIC_VOLUME; pg.preload="auto";
    pregameMusicRef.current=pg;
    const gp=new Audio("sounds/gameplay.mp3");
    gp.loop=true; gp.volume=MUSIC_VOLUME; gp.preload="auto";
    gameplayMusicRef.current=gp;
    // Try to autoplay immediately; if browser blocks it, first click will start it
    if(!musicMuted){
      pg.play().then(()=>{ musicStartedRef.current=true; }).catch(()=>{});
    }
    return()=>{ pg.pause(); gp.pause(); };
  },[]);

  // Cross-fade helper: fade out one track, fade in the other
  const crossFade=(fadeOut,fadeIn,duration=800)=>{
    if(musicMuted)return;
    const steps=20; const interval=duration/steps;
    let step=0;
    if(fadeIn){ fadeIn.volume=0; fadeIn.play().catch(()=>{}); }
    const timer=setInterval(()=>{
      step++;
      const progress=step/steps;
      if(fadeOut) fadeOut.volume=Math.max(0,MUSIC_VOLUME*(1-progress));
      if(fadeIn) fadeIn.volume=Math.min(MUSIC_VOLUME,MUSIC_VOLUME*progress);
      if(step>=steps){
        clearInterval(timer);
        if(fadeOut){ fadeOut.pause(); fadeOut.currentTime=0; }
      }
    },interval);
  };

  // Fallback: start pregame music on first click if autoplay was blocked
  const startPregameMusic=useCallback(()=>{
    if(musicStartedRef.current||musicMuted)return;
    musicStartedRef.current=true;
    const pg=pregameMusicRef.current;
    if(pg){ pg.volume=MUSIC_VOLUME; pg.play().catch(()=>{}); }
  },[musicMuted]);

  useEffect(()=>{
    const handler=()=>startPregameMusic();
    document.addEventListener("click",handler,{once:true});
    return()=>document.removeEventListener("click",handler);
  },[startPregameMusic]);

  // Switch to gameplay music when match starts
  const startGameplayMusic=()=>{
    musicStartedRef.current=true;
    crossFade(pregameMusicRef.current,gameplayMusicRef.current);
  };

  // Switch back to pregame music when match ends
  const stopGameplayMusic=()=>{
    crossFade(gameplayMusicRef.current,pregameMusicRef.current);

  // Watch for game over → switch back to pregame
  useEffect(()=>{
    if(game?.winner){ stopGameplayMusic(); }

  // Mute/unmute toggle

      try{ localStorage.setItem("bh_war_music_muted",String(next)); }catch(e){}
      const pg=pregameMusicRef.current, gp=gameplayMusicRef.current;
      if(next){ if(pg){pg.pause();} if(gp){gp.pause();} }
      else{
        musicStartedRef.current=true;
        // Resume whichever track should be playing
        if(game&&!game.winner){ if(gp){gp.volume=MUSIC_VOLUME;gp.play().catch(()=>{});} }
        else{ if(pg){pg.volume=MUSIC_VOLUME;pg.play().catch(()=>{});} }
      }
      return next;
    });
  };
  const [game,setGame]=useState(null);

  const [warDeclared,setWarDeclared]=useState(false);

  // Helper: try to create a WaxJS instance
  function tryInitWax(){
    if(waxRef.current) return true;
    // Primary: use the bridge reference set by the non-Babel script
    var Cls = window.__WaxJSClass;
    // Fallback: try direct global access
    if(!Cls && typeof waxjs !== "undefined") Cls = waxjs.WaxJS || waxjs.default?.WaxJS || waxjs.default;
    if(!Cls && typeof WaxJS !== "undefined") Cls = WaxJS;
    // Last resort: crawl the raw waxjs object for anything with a login method
    if(!Cls && window.__waxjsRaw){
      var raw = window.__waxjsRaw;
      var keys = Object.keys(raw);
      for(var k=0;k<keys.length;k++){
        var val = raw[keys[k]];
        if(val && val.prototype && val.prototype.login){ Cls=val; break; }
      }
    }
    if(Cls){
      try{
        waxRef.current = new Cls({ rpcEndpoint: WAX_CONFIG.rpcEndpoint, tryAutoLogin: false });
        return true;
      }catch(e){ console.error("[WaxJS] Init error:",e); }
    }
    return false;
  }

  // Initialize WaxJS instance (with retry for async CDN loading)
  useEffect(()=>{
    if(tryInitWax()) return;
    // CDN might still be loading via fallback chain — retry a few times
    let attempts = 0;
    const interval = setInterval(()=>{
      attempts++;

    try {
      const resp = await fetch(MINT_API+"/mint", {

      });

        setTimeout(()=>setBadgeNotif(null), 8000);
      } else if(data.already_owned){
        // Player already has this badge, no notification needed
      } else {
        console.error("Badge mint error:", data.error);
      }
    } catch(e){ console.error("Badge mint failed:", e); }
  }

  // Load stats + profile when account changes
  useEffect(()=>{
    const saved=loadStats();
    setStats(saved||{...defaultStats});
    const prof=loadProfile();
    setUsername(prof?.username||"");
    setAvatar(prof?.avatar||null);
    setEditingProfile(false);
  },[walletAccount,demoMode]);

  const handleAvatarUpload=(e)=>{
    const file=e.target.files?.[0];
    if(!file) return;
    if(file.size>500000){ alert("Image too large. Please use an image under 500KB."); return; }
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const img=new Image();
      img.onload=()=>{
        // Resize to max 120x120
        const canvas=document.createElement("canvas");
        const scale=Math.min(120/img.width,120/img.height,1);
        canvas.width=img.width*scale;
        canvas.height=img.height*scale;
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        const dataUrl=canvas.toDataURL("image/jpeg",0.8);
        setAvatar(dataUrl);
        saveProfile({username,avatar:dataUrl});
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const saveUsername=(val)=>{
    setUsername(val);
    saveProfile({username:val,avatar});
  };

  // Track game completion for achievements + stats
  useEffect(()=>{
    if(!game?.winner) return;
    setStats(prev=>{
      const s={...prev};
      const won=game.winner==="player";
      const lost=game.winner==="opponent";
      const tied=game.winner==="tie";
      if(won){ s.wins++; s.winStreak++; s.bestStreak=Math.max(s.bestStreak,s.winStreak); }
      if(lost){ s.losses++; s.winStreak=0; }
      if(tied){ s.ties++; s.winStreak=0; }
      // Best score = highest player points in a game
      if(game.pPts>s.bestScore) s.bestScore=game.pPts;
      // Worst loss = biggest point deficit when losing
      if(lost){
        const deficit=game.oPts-game.pPts;
        if(deficit>s.worstLoss) s.worstLoss=deficit;
      }
      saveStats(s);
      return s;
    });
    // First match badge
    mintBadge("first_match");
  },[game?.winner]);

  const villain=VILLAINS[villainId]||VILLAINS.the_swarm;
  const dc=countByRarity(deck);
  const fill=Math.min(100,Math.round(deck.length/DECK_SIZE*100));
  const pLeft=game?.pp.length??deck.length;
  const oLeft=game?.op.length??0;
  const isWar=(game?.tp.length??0)>0;
  const totalPts=(game?.pPts??0)+(game?.oPts??0);
  const pPct=totalPts>0?Math.round((game?.pPts??0)/totalPts*100):50;

  const startBattle=()=>{
    if(!deck.length)return;
    setShowConfetti(false); setRoundOutcome(null); setEndgameSplash(null);
    const v=VILLAINS[villainId]||VILLAINS.the_swarm;
    setGame(createGame(deck,buildDeck(ownedCards),v.cfg,villainId));
    // Switch to gameplay music
    startGameplayMusic();
    // Play villain passive ability sound on battle start
    if(v.id==="whisper")setTimeout(()=>playSfx("fud",0.4),500);
    else if(v.id==="encryptkeeper")setTimeout(()=>playSfx("encrypt",0.4),500);
  };
  const play=()=>{
    if(!game)return;
    if(game.reveal){
      // Resolve phase — compute outcome and trigger effects
      const next=resolveRound(game);
      const ps=getCardStrength(game.cur.p)+(game.pBuff?1:0)+(game.pManualBuff?1:0);
      const os=getCardStrength(game.cur.o)+(game.oBuff?1:0)+(game.oManualBuff?1:0);
      if(ps>os){
        setRoundOutcome("win"); if(next.lastPtsWon>0)addFloatingPts(next.lastPtsWon,"win","player");
        playSfx("battle-victory",0.5);
      }
      else if(os>ps){
        setRoundOutcome("lose"); if(next.lastPtsWon>0)addFloatingPts(next.lastPtsWon,"lose","opponent");
        playSfx("battle-loss",0.5);
      }
      else {
        setRoundOutcome("tie"); setWarDeclared(true);
        playSfx("war-declared",0.6);
        // Villain-specific WAR sound: Overwhelm for The Swarm
        const gv=game.villain?VILLAINS[game.villain]:null;
        if(gv?.warCards>3)setTimeout(()=>playSfx("overwhelm",0.45),300);
      }
      // Counter-Strike, Shield, Devour, Leech sounds on the resolve
      if(next.oCounterStrike)setTimeout(()=>playSfx("counter-strike",0.5),200);
      if(next.oShieldUsed)setTimeout(()=>playSfx("shield-block",0.5),200);
      if(next.devoured)setTimeout(()=>playSfx("devour",0.5),400);
      if(next.leeched)setTimeout(()=>playSfx("leech",0.5),400);
      if(next.lastPtsWon>0)setScoreFlash(true);
      setTimeout(()=>{ setRoundOutcome(null); setWarDeclared(false); setScoreFlash(false); },1500);
      // Match end sounds + splash graphic
      if(next.winner==="player"){
        setTimeout(()=>setShowConfetti(true),400);
        setTimeout(()=>playSfx("victory",0.6),300);
        setTimeout(()=>{ setEndgameSplash("player"); setTimeout(()=>setEndgameSplash(null),3200); },200);
      }
      else if(next.winner==="opponent"){
        setTimeout(()=>playSfx("loss",0.6),300);
        setTimeout(()=>{ setEndgameSplash("opponent"); setTimeout(()=>setEndgameSplash(null),3200); },200);
      }
      setGame(next);
    } else {
      setRoundOutcome(null);
      playSfx("card-flip",0.4);
      setGame(prepareRound(game));
    }
  };
  const triggerPower=()=>{ setGame(g=>{ if(!g||g.winner||g.reveal||g.pManualBuff||g.pCharges<=0)return g; playSfx("ability-trigger",0.5); return{...g,pManualBuff:true,pCharges:g.pCharges-1}; }); };
  const peek=()=>{ setGame(g=>{ if(!g||g.winner||g.reveal||g.pPeeking||g.pPeeks<=0||(g.tp.length>0))return g; playSfx("peek",0.5); return{...g,pPeeking:true,pPeeks:g.pPeeks-1}; }); };
  const doubleDown=()=>{ setGame(g=>{ if(!g||g.winner||g.reveal||g.pDoubleDown||g.pDoubles<=0)return g; playSfx("double-down",0.5); return{...g,pDoubleDown:true,pDoubles:g.pDoubles-1}; }); };
  const toggleCard=(card)=>{
    setDeck(cur=>{
      if(cur.some(c=>c.id===card.id))return cur.filter(c=>c.id!==card.id);
      if(!canAdd(card,cur))return cur;
      return[...cur,card];
    });
  };

  const roundResult=game&&game.cur&&!game.reveal&&!game.winner?(()=>{
    const ps=getCardStrength(game.cur.p)+(game.pBuff?1:0)+(game.pManualBuff?1:0),os=getCardStrength(game.cur.o)+(game.oBuff?1:0)+(game.oManualBuff?1:0);
    const lp=game.lastPtsWon||0;
    const extras=[];
    if(game.oCounterStrike)extras.push("⚡ Counter-Strike!");
    if(game.oShieldUsed)extras.push("🛡️ Shield blocked!");
    if(lp>0&&game.lastDoubleDown)extras.push("🎲 Double Down!");
    if(game.devoured)extras.push("👁️ Devoured! -1 pt stolen");
    if(game.leeched)extras.push("🧛 Leeched! Lost 1 "+game.leeched+" charge");
    const extraLine=extras.length>0?<div style={{fontSize:20,fontWeight:700,color:"#fbbf24",marginTop:4}}>{extras.join(" ")}</div>:null;
    if(game.oShieldUsed)return<div className="result-win text-center slide-up">🛡️ You win, but Shield {game.cfg.shieldEffect==="block"?"blocked all":"halved"} your points! ({ps} vs {os}) +{lp} pts{extraLine}</div>;
    if(ps>os)return<div className="result-win text-center slide-up">You win this round! ({ps} vs {os}) +{lp} pts{extraLine}</div>;
    if(os>ps)return<div className="result-lose text-center slide-up">{(game.villain?VILLAINS[game.villain]?.name:"Opponent")||"Opponent"} wins! ({ps} vs {os}) +{lp} pts{extraLine}</div>;
    return<div className="result-tie text-center slide-up">TIE! WAR is declared! ({ps} vs {os}){extraLine}</div>;
  })():null;

  return(
    <div className="app">
      {/* ═══════════ HEADER WITH WALLET ═══════════ */}
      <div className="header-row">
        <h1 style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}><img src="blockchain-heroes-logo.png" alt="Blockchain Heroes" style={{height:60,maxWidth:320}}/> WAR
          <button onClick={toggleMusic} title={musicMuted?"Unmute music":"Mute music"} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:10,padding:"6px 10px",cursor:"pointer",fontSize:20,lineHeight:1,color:"#94a3b8",WebkitTextFillColor:"#94a3b8",marginLeft:4}}>{musicMuted?"🔇":"🔊"}</button>
        </h1>
        <div className="wallet-area">
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            {walletAccount ? (
              <>
                <button className="btn btn-wallet connected" onClick={disconnectWallet}>Disconnect</button>
                <span className="badge badge-live">{walletAccount} ({walletType==="anchor"?"Anchor":"WCW"})</span>
              </>
            ) : !demoMode && (
              <>
                <button className="btn btn-wallet" onClick={connectWallet} disabled={walletLoading}>
                  {walletLoading ? (<><span className="spinner"></span> Connecting...</>) : "WAX Cloud Wallet"}
                </button>
                <button className="btn btn-wallet" onClick={connectAnchor} disabled={walletLoading} style={{background:"linear-gradient(135deg,#3650A2,#4A6CF7)"}}>
                  {walletLoading ? (<><span className="spinner"></span> Connecting...</>) : "Anchor Wallet"}
                </button>
              </>
            )}
            {!walletAccount && <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:16,color:demoMode?"#67e8f9":"#94a3b8"}}>
              <input type="checkbox" checked={demoMode} onChange={(e)=>toggleDemoMode(e.target.checked)} style={{width:20,height:20,accentColor:"#67e8f9"}}/>
              I don't have cards!
            </label>}
            {demoMode && <span className="badge" style={{background:"#0e7490",color:"#ecfeff",fontSize:14,padding:"4px 12px",borderRadius:12}}>Demo Mode</span>}
          </div>
        </div>
      </div>

      {/* ═══════════ PLAYER PROFILE ═══════════ */}
      {isConnected && !demoMode && <div style={{marginBottom:16,padding:"16px 24px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
        <div style={{position:"relative",width:80,height:80,flexShrink:0}}>
          {avatar ? (
            <img src={avatar} alt="avatar" style={{width:80,height:80,borderRadius:"50%",objectFit:"cover",border:"3px solid rgba(255,255,255,0.2)"}}/>
          ) : (
            <div style={{width:80,height:80,borderRadius:"50%",background:"rgba(255,255,255,0.08)",border:"3px dashed rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:"#64748b",textAlign:"center",cursor:"pointer"}} onClick={()=>avatarInputRef.current?.click()}>No Avatar</div>
          )}
          <input ref={avatarInputRef} type="file" accept="image/*" onChange={handleAvatarUpload} style={{display:"none"}}/>
        </div>
        <div style={{flex:1,minWidth:200}}>
          {editingProfile ? (
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <input type="text" value={username} onChange={(e)=>setUsername(e.target.value)} placeholder="Enter username" maxLength={24} style={{fontSize:20,padding:"8px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.2)",background:"rgba(0,0,0,0.3)",color:"#f1f5f9",outline:"none",width:200}}/>
              <button className="btn btn-sm" onClick={()=>{ saveUsername(username); setEditingProfile(false); }} style={{fontSize:16,padding:"8px 16px"}}>Save</button>
              <button className="btn btn-sm" onClick={()=>avatarInputRef.current?.click()} style={{fontSize:16,padding:"8px 16px"}}>Upload Avatar</button>
            </div>
          ) : (
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div>
                <div style={{fontSize:22,fontWeight:700,color:"#f1f5f9"}}>{username||"Anonymous Hero"}</div>
                <div style={{fontSize:15,color:"#64748b"}}>{walletAccount}</div>
              </div>
              <button className="btn btn-sm" onClick={()=>setEditingProfile(true)} style={{fontSize:14,padding:"4px 12px",opacity:0.7}}>Edit</button>
            </div>
          )}
        </div>
      </div>}

      <div style={{marginBottom:20,padding:"20px 24px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:24}}>
        <div style={{fontSize:24,fontWeight:800,color:"#f1f5f9",marginBottom:8}}>Your Heroes. Your Strategy. Your WAR.</div>
        <div style={{fontSize:18,color:"#94a3b8",lineHeight:1.6,marginBottom:16}}>Connect your WAX wallet, build a deck from your Blockchain Heroes collection, and battle head-to-head in a 50-round showdown. Every rarity has a role. Every card has a chance to power up. And with limited Boosts, Peeks, and Double Downs, the choices you make decide who wins.</div>
        <details style={{cursor:"pointer"}}>
          <summary style={{fontSize:20,fontWeight:700,color:"#67e8f9",marginBottom:8}}>How to Play</summary>
          <div style={{marginTop:10}}>
            {/* Getting Started */}
            <div style={{fontSize:19,fontWeight:700,color:"#f1f5f9",marginBottom:6}}>Getting Started</div>
            <ol style={{fontSize:17,color:"#cbd5e1",lineHeight:1.7,paddingLeft:24,marginBottom:16}}>
              <li>Connect your <strong>WAX Cloud Wallet</strong> or <strong>Anchor Wallet</strong>.</li>
              <li>Your Series 1 Blockchain Heroes load automatically.<br/><span style={{fontSize:15,color:"#94a3b8"}}>Don't have cards? Check the <em>"I don't have cards!"</em> box to play with a full demo deck.</span></li>
              <li>Build your deck manually or click <strong>BUILD</strong> to auto-fill the best 50-card deck.</li>
              <li>Head to the <strong>Battle</strong> tab and press <strong>Start Match</strong>.</li>
            </ol>

            {/* Deck Building */}
            <div style={{fontSize:19,fontWeight:700,color:"#f1f5f9",marginBottom:6}}>Deck Building</div>
            <ul style={{fontSize:17,color:"#cbd5e1",lineHeight:1.7,paddingLeft:24,marginBottom:16}}>
              <li>Your deck holds up to <strong>50 cards</strong> — one variant per hero.</li>
              <li>Rarity caps keep decks balanced: <span style={{color:"#fbbf24"}}>Legendary 4</span>, <span style={{color:"#c084fc"}}>Epic 8</span>, <span style={{color:"#60a5fa"}}>Rare 10</span>, <span style={{color:"#4ade80"}}>Uncommon 12</span>, <span style={{color:"#94a3b8"}}>Common 16</span>.</li>
              <li>Missing a hero? Click the <span style={{color:"#f87171"}}>red link</span> in the checklist to find it on the marketplace.</li>
            </ul>

            {/* How Rounds Work */}
            <div style={{fontSize:19,fontWeight:700,color:"#f1f5f9",marginBottom:6}}>How Rounds Work</div>
            <ul style={{fontSize:17,color:"#cbd5e1",lineHeight:1.7,paddingLeft:24,marginBottom:16}}>
              <li>Each round, both players flip the top card of their deck. The higher <strong>STR</strong> wins the round and claims both cards as points.</li>
              <li>Card strength is based on rarity: Common 1, Uncommon 2, Rare 3, Epic 4, Legendary 5.</li>
              <li>On a <strong>tie</strong>, WAR is declared! Three cards go face-down from each side, then a fourth card is flipped — the winner takes the entire pile.</li>
              <li>The match lasts up to <strong>50 rounds</strong>. If both players still have cards at round 50, the player with more points wins.</li>
            </ul>

            {/* Hero Powers */}
            <div style={{fontSize:19,fontWeight:700,color:"#f1f5f9",marginBottom:6}}>Hero Powers</div>
            <ul style={{fontSize:17,color:"#cbd5e1",lineHeight:1.7,paddingLeft:24,marginBottom:16}}>
              <li>Each hero has a unique named power. Every round, there's a chance the power activates automatically for <strong>+1 STR</strong>.</li>
              <li>Lower rarity cards have a <em>higher</em> chance to power up: <span style={{color:"#94a3b8"}}>Common 50%</span>, <span style={{color:"#4ade80"}}>Uncommon 35%</span>, <span style={{color:"#60a5fa"}}>Rare 20%</span>, <span style={{color:"#c084fc"}}>Epic 10%</span>, <span style={{color:"#fbbf24"}}>Legendary 5%</span>.</li>
              <li>This means a Common card with a power activation can beat an Uncommon — every card matters!</li>
            </ul>

            {/* Villains & Difficulty */}
            <div style={{fontSize:19,fontWeight:700,color:"#ef4444",marginBottom:6}}>Blockchain Villains</div>
            <ul style={{fontSize:17,color:"#cbd5e1",lineHeight:1.7,paddingLeft:24,marginBottom:16}}>
              <li>Choose one of <strong>5 Blockchain Villains</strong> to battle against. Each has a unique ability and difficulty level — the villain <em>is</em> the difficulty.</li>
              <li><strong style={{color:"#06b6d4"}}>The Swarm</strong> ★☆☆☆☆ <em>(Easy)</em> — <em>Overwhelm</em>: WAR uses 4 facedown cards instead of 3. Forgiving AI with no shields and low counter-strike.</li>
              <li><strong style={{color:"#94a3b8"}}>Whisper</strong> ★★☆☆☆ <em>(Normal)</em> — <em>FUD</em>: Your hero powers activate 15% less often. Moderate AI with 1 shield and 15% counter-strike.</li>
              <li><strong style={{color:"#e879f9"}}>Lady Iris</strong> ★★★☆☆ <em>(Hard)</em> — <em>Leech</em>: 25% chance to drain 1 ability charge when she wins. Aggressive AI with 2 shields and 25% counter-strike.</li>
              <li><strong style={{color:"#22c55e"}}>Encryptkeeper</strong> ★★★★☆ <em>(Insane)</em> — <em>Encrypt</em>: Opponent card strength hidden during reveal. Near-perfect AI with 3 shields that fully block points and 40% counter-strike — use Peek to counter!</li>
              <li><strong style={{color:"#ef4444"}}>Rez'Phede</strong> ★★★★★ <em>(Impossible)</em> — <em>Devour</em>: 40% chance to steal 1 point when winning. Perfect AI with 5 shields that fully block points and 50% counter-strike. Only 1 peek and 1 double down available. Good luck.</li>
            </ul>

            {/* Your Abilities */}
            <div style={{fontSize:19,fontWeight:700,color:"#67e8f9",marginBottom:6}}>Your Abilities</div>
            <ul style={{fontSize:17,color:"#cbd5e1",lineHeight:1.7,paddingLeft:24,marginBottom:16}}>
              <li><strong>⚡ Trigger Power</strong> — Manually boost your card by +1 STR before revealing. Use it to close gaps or secure a win. But beware — the opponent may Counter-Strike!</li>
              <li><strong>👁️ Peek</strong> — See the opponent's next card before you commit. Knowledge is power. Not available during WAR.</li>
              <li><strong>🎲 Double Down</strong> — Bet big! Double the points for the current round. Both wins <em>and</em> losses are worth 2x. Pairs well with Peek to know when to risk it.</li>
            </ul>

            {/* Opponent Abilities */}
            <div style={{fontSize:19,fontWeight:700,color:"#fda4af",marginBottom:6}}>Opponent Abilities</div>
            <ul style={{fontSize:17,color:"#cbd5e1",lineHeight:1.7,paddingLeft:24,marginBottom:16}}>
              <li><strong>⚡ Buffs</strong> — The villain boosts strategically when losing by 1 or tied. Smarter villains are more accurate and have more buff charges to use throughout the game.</li>
              <li><strong>⚡ Counter-Strike</strong> — When you use Trigger Power, the villain may auto-counter with their own +1 STR. Tougher villains counter more often.</li>
              <li><strong>🛡️ Shield</strong> — The villain can reduce or fully block your points on a big win. Easy/Normal/Hard villains halve the points; Insane/Impossible villains block them entirely and will aggressively counter your Double Down. Harder villains have more shields.</li>
            </ul>

            {/* Scoring & Winning */}
            <div style={{fontSize:19,fontWeight:700,color:"#f1f5f9",marginBottom:6}}>Scoring & Winning</div>
            <ul style={{fontSize:17,color:"#cbd5e1",lineHeight:1.7,paddingLeft:24,marginBottom:16}}>
              <li>You earn <strong>1 point per card captured</strong> (or 2 with Double Down).</li>
              <li>WAR piles can be worth 8+ points — high stakes moments!</li>
              <li>The game ends when one player runs out of cards or after 50 rounds — highest score wins.</li>
              <li>Play with a connected wallet to earn <strong>NFT badges</strong> for achievements!</li>
            </ul>

            {/* Tips */}
            <div style={{fontSize:19,fontWeight:700,color:"#fbbf24",marginBottom:6}}>Tips</div>
            <ul style={{fontSize:17,color:"#cbd5e1",lineHeight:1.7,paddingLeft:24,marginBottom:0}}>
              <li>Use Peek before Double Down — see what you're up against before betting big.</li>
              <li>Save Trigger Power for close matchups where +1 STR makes the difference.</li>
              <li>Common cards power up 50% of the time — don't underestimate them!</li>
              <li>Watch the opponent's charge counts — once they're out of shields and buffs, press your advantage.</li>
            </ul>
          </div>
        </details>
      </div>

      {badgeNotif && <div style={{background:"rgba(74,222,128,0.12)",border:"1px solid rgba(74,222,128,0.4)",borderRadius:16,padding:"14px 20px",fontSize:22,color:"#4ade80",marginBottom:16,textAlign:"center",fontWeight:700}}>{badgeNotif}</div>}
      {error && <div className="error-banner">{error}</div>}
      {inventoryLoading && <div className="loading-banner"><span className="spinner"></span> Loading {walletAccount}'s inventory from AtomicAssets...</div>}

      <div className="tabs-list" style={{gridTemplateColumns:"1fr 1fr"}}>
        <button className={`tab-btn ${tab==="collection"?"active":""}`} onClick={()=>setTab("collection")}>Collection & Deck</button>
        <button className={`tab-btn ${tab==="battle"?"active":""}`} onClick={()=>setTab("battle")}>Battle</button>
        {/* Power Registry tab hidden for now — re-enable when ability system is ready */}
      </div>

      {/* ═══════════ BATTLE TAB ═══════════ */}
      {tab==="battle"&&<div className="space" style={{backgroundImage:`linear-gradient(rgba(15,23,42,0.82),rgba(15,23,42,0.88)),url(${ARENA_BG})`,backgroundSize:"cover",backgroundPosition:"center",backgroundRepeat:"no-repeat",borderRadius:24,padding:16,margin:"-8px -4px"}}>
        <div className={`ui-card${warDeclared?" fx-screen-shake":""}`} style={{textAlign:"center"}}>
          {/* Villain selector — full panel when no active game, collapsed during play */}
          {(!game||game.winner)?<div className="villain-panel">
            <div className="villain-panel-title">Choose Your Villain</div>
            <div className="villain-grid">
              {Object.values(VILLAINS).map(v=>{
                const sel=villainId===v.id;
                return(
                  <div key={v.id} className={`villain-card${sel?" selected":""}`} onClick={()=>saveVillain(v.id)} style={{borderColor:sel?v.color:"rgba(255,255,255,0.1)",background:sel?v.color+"18":"rgba(255,255,255,0.03)"}}>
                    <img src={villainImgUrl(v)} alt={v.name} onError={(e)=>{e.target.style.display="none"}}/>
                    <div className="v-name" style={{color:v.color}}>{v.name}</div>
                    <div className="v-subtitle">{v.subtitle}</div>
                    <div className="v-stars">{"★".repeat(v.difficulty)+"☆".repeat(5-v.difficulty)}</div>
                    <div className="v-label" style={{color:v.color}}>{v.diffLabel}</div>
                    <div className="v-ability" style={{color:v.color}}>{v.ability}</div>
                    <div className="v-desc">{v.abilityDesc}</div>
                  </div>
                );
              })}
            </div>
          </div>:null}
          <div className="flex-wrap" style={{justifyContent:"center",gap:10,marginBottom:10}}>
            <button className="btn btn-primary" onClick={startBattle} disabled={deck.length===0}>&#x1F451; Start Match</button>
            <button className="btn btn-primary" onClick={play} disabled={!game||!!game.winner}>{game?.reveal?"Resolve":"Play"}</button>
            {game&&!game.winner&&(()=>{const gv=game.villain?VILLAINS[game.villain]:null;return gv?<span className="badge" style={{background:gv.color+"22",color:gv.color,fontSize:14,padding:"4px 14px",borderRadius:12,border:"1px solid "+gv.color+"44"}}>vs {gv.name} {"★".repeat(gv.difficulty)+"☆".repeat(5-gv.difficulty)}</span>:null;})()}
          </div>
          {deck.length===0&&!inventoryLoading&&<div className="text-sm text-slate" style={{marginBottom:8}}>Go to Collection & Deck to build your deck first.</div>}
          {/* ── Score bar ── */}
          {game&&<div style={{marginBottom:8,position:"relative"}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:20,color:"#94a3b8",marginBottom:4}}>
              <span>You: {game.pPts} pts ({pLeft})</span><span style={{fontWeight:700}}>Round {game.round}/{MAX_ROUNDS}</span><span>{(game.villain?VILLAINS[game.villain]?.name:"Opp")||"Opp"}: {game.oPts} pts ({oLeft})</span>
            </div>
            <div className="score-track"><div className={`score-fill${scoreFlash?" fx-score-flash":""}`} style={{width:pPct+"%"}}/></div>
            {floatingPts.map(fp=><div key={fp.id} className={`float-pts pts-${fp.type}`} style={{left:fp.side==="player"?"15%":"75%",top:"-10px"}}>+{fp.amount}</div>)}
          </div>}
          {/* ── WAR banner ── */}
          {isWar&&<div className={`war-banner${warDeclared?" fx-banner-slam":""}`} style={{marginBottom:8,padding:"10px 14px",fontSize:20}}>WAR! {(()=>{const gv=game?.villain?VILLAINS[game.villain]:null;const wc=gv?.warCards||3;return wc+" cards go down. The last decides the pile."+(wc>3?" ("+gv.name+" Overwhelm!)":"");})()}</div>}
          {/* ── Round result ── */}
          {roundResult}
          {/* ── Winner ── */}
          {game?.winner&&<div style={{backgroundImage:`linear-gradient(rgba(15,23,42,0.6),rgba(15,23,42,0.75)),url(${VICTORY_BG})`,backgroundSize:"cover",backgroundPosition:"center",borderRadius:20,padding:"24px 16px",marginTop:8}}>
  <div className="win-text" style={{fontSize:32}}>
  {game.winner==="player"?"You Win!":game.winner==="opponent"?(VILLAINS[game.villain]?.name||"Opponent")+" Wins!":"It's a Draw!"}
  </div>
  <div style={{fontSize:20,fontWeight:400,color:"#94a3b8",marginTop:4}}>Final: You {game.pPts} - {game.oPts} {VILLAINS[game.villain]?.name||"Opp"}{game.round>=MAX_ROUNDS?" (Round limit)":" (All cards captured)"}</div>
</div>}
          <Confetti show={showConfetti}/>
          {endgameSplash&&<div className="endgame-splash" key={endgameSplash}><img src={endgameSplash==="player"?ENDGAME_VICTORY:ENDGAME_DEFEAT} alt={endgameSplash==="player"?"Victory!":"Defeated!"}/></div>}
        </div>
        {/* ── CARDS — the main event ── */}
        <div className="grid-2">
          <FlipCard card={game?.cur?.p} facedown={!game?.reveal} label={isWar?"Your deciding card":(game?.pDoubleDown?"Your card (DOUBLE DOWN!)":"Your card")} warFD={game?.reveal?game?.wfp||[]:[]} buffed={game?.reveal&&game?.pBuff} manualBuff={game?.reveal&&game?.pManualBuff} outcome={roundOutcome} doubleDown={!!game?.pDoubleDown} isWinner={game?.winner==="player"} warActive={isWar&&game?.reveal}/>
          {(()=>{
            const isPeeking=game?.pPeeking&&!game?.reveal;
            const gv=game?.villain?VILLAINS[game.villain]:null;
            const wci=(gv?.warCards||3)-1;
            const peekCard=isPeeking?((game?.tp?.length>0)?game?.op?.[wci]:game?.op?.[0]):null;
            const vName=gv?.name||"Opponent";
            if(peekCard)return <FlipCard card={peekCard} facedown={false} label={"Peeking at "+vName+"'s next card"} peeking={true}/>;
            const oppOutcome=roundOutcome==="win"?"lose":roundOutcome==="lose"?"win":roundOutcome;
            const isEncrypted=!!gv?.encrypted&&!!game?.reveal;
            return <FlipCard card={game?.cur?.o} facedown={!game?.reveal} label={isWar?vName+"'s deciding card":vName+"'s card"} warFD={game?.reveal?game?.wfo||[]:[]} buffed={game?.reveal&&game?.oBuff} manualBuff={game?.reveal&&game?.oManualBuff} counterStrike={game?.reveal&&game?.oCounterStrike} outcome={oppOutcome} doubleDown={!!game?.pDoubleDown} shieldUsed={!!game?.oShieldUsed} isWinner={game?.winner==="opponent"} warActive={isWar&&game?.reveal} encrypted={isEncrypted}/>;
          })()}
        </div>
        {/* ── Compact ability toolbar ── */}
        {game&&!game.winner&&<div style={{marginTop:10,padding:"12px 16px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16}}>
          <div style={{display:"flex",justifyContent:"center",gap:8,flexWrap:"wrap",marginBottom:8}}>
            <button className="btn" onClick={triggerPower} disabled={!game||game.winner||game.reveal||game.pManualBuff||game.pCharges<=0} style={{background:game.pManualBuff?"#059669":game.pCharges>0?"#6366f1":"#334155",color:"white",fontSize:16,padding:"8px 16px",borderRadius:12,display:"flex",alignItems:"center",gap:6}}>⚡ {game.pManualBuff?"Boosted!":"Boost"} <span style={{opacity:0.7,fontSize:14}}>({game.pCharges})</span></button>
            <button className="btn" onClick={peek} disabled={!game||game.winner||game.reveal||game.pPeeking||game.pPeeks<=0||isWar} style={{background:isWar?"#334155":game.pPeeking?"#059669":game.pPeeks>0?"#0891b2":"#334155",color:"white",fontSize:16,padding:"8px 16px",borderRadius:12,display:"flex",alignItems:"center",gap:6}}>👁️ {game.pPeeking?"Peeking!":"Peek"} <span style={{opacity:0.7,fontSize:14}}>({game.pPeeks})</span></button>
            <button className="btn" onClick={doubleDown} disabled={!game||game.winner||game.reveal||game.pDoubleDown||game.pDoubles<=0} style={{background:game.pDoubleDown?"#059669":game.pDoubles>0?"#d97706":"#334155",color:"white",fontSize:16,padding:"8px 16px",borderRadius:12,display:"flex",alignItems:"center",gap:6}}>🎲 {game.pDoubleDown?"Doubled!":"Double"} <span style={{opacity:0.7,fontSize:14}}>({game.pDoubles})</span></button>
          </div>
          <div style={{display:"flex",justifyContent:"center",gap:16,fontSize:15,color:"#94a3b8",flexWrap:"wrap"}}>
            {(()=>{const gv=game.villain?VILLAINS[game.villain]:null;return gv?<span style={{color:gv.color,fontWeight:700}}>{gv.name}: {gv.ability}</span>:null;})()}
            <span style={{color:"#fda4af"}}>⚡ Buffs ({game.oCharges})</span>
            <span style={{color:"#fda4af"}}>⚡ Counter ({Math.round(game.cfg.counterStrike*100)}%)</span>
            {game.cfg.shields>0&&<span style={{color:"#fda4af"}}>🛡️ Shield ({game.oShields})</span>}
          </div>
        </div>}
        {/* Stats Panel */}
        <div className="ui-card" style={{marginTop:16}}>
          <div className="ui-card-title">Player Stats</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,textAlign:"center"}}>
            <div style={{padding:12,background:"rgba(74,222,128,0.08)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:12}}>
              <div style={{fontSize:28,fontWeight:800,color:"#4ade80"}}>{stats.wins}</div>
              <div style={{fontSize:16,color:"#94a3b8"}}>Wins</div>
            </div>
            <div style={{padding:12,background:"rgba(244,63,94,0.08)",border:"1px solid rgba(244,63,94,0.2)",borderRadius:12}}>
              <div style={{fontSize:28,fontWeight:800,color:"#f87171"}}>{stats.losses}</div>
              <div style={{fontSize:16,color:"#94a3b8"}}>Losses</div>
            </div>
            <div style={{padding:12,background:"rgba(250,204,21,0.08)",border:"1px solid rgba(250,204,21,0.2)",borderRadius:12}}>
              <div style={{fontSize:28,fontWeight:800,color:"#facc15"}}>{stats.ties}</div>
              <div style={{fontSize:16,color:"#94a3b8"}}>Ties</div>
            </div>
            <div style={{padding:12,background:"rgba(99,102,241,0.08)",border:"1px solid rgba(129,140,248,0.2)",borderRadius:12}}>
              <div style={{fontSize:28,fontWeight:800,color:"#a5b4fc"}}>{stats.winStreak}</div>
              <div style={{fontSize:16,color:"#94a3b8"}}>Win Streak</div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginTop:12,textAlign:"center"}}>
            <div style={{padding:12,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12}}>
              <div style={{fontSize:28,fontWeight:800,color:"#e2e8f0"}}>{stats.bestStreak}</div>
              <div style={{fontSize:16,color:"#94a3b8"}}>Best Streak</div>
            </div>
            <div style={{padding:12,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12}}>
              <div style={{fontSize:28,fontWeight:800,color:"#e2e8f0"}}>{stats.bestScore}</div>
              <div style={{fontSize:16,color:"#94a3b8"}}>Best Score</div>
            </div>
            <div style={{padding:12,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12}}>
              <div style={{fontSize:28,fontWeight:800,color:"#e2e8f0"}}>{stats.worstLoss>0?"-"+stats.worstLoss:"—"}</div>
              <div style={{fontSize:16,color:"#94a3b8"}}>Worst Loss</div>
            </div>
          </div>
        </div>
      </div>}

      {/* ═══════════ COLLECTION TAB ═══════════ */}
      {tab==="collection"&&<div className="space">
        <div className="ui-card">
          <div className="ui-card-title">Deck Builder</div>
          <div className="flex-wrap mb-4">
            <button className="btn btn-primary" onClick={()=>setDeck(buildDeck(ownedCards))}>Build Deck</button>
            <span className="text-sm text-slate">One click to build the largest legal deck.</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:18,color:"#94a3b8",marginBottom:6}}>
            <span>{deck.length}/{DECK_SIZE} cards</span><span>{fill}%</span>
          </div>
          <div className="progress-track"><div className="progress-fill" style={{width:fill+"%"}}/></div>
          <div className="grid-5 mt-3">
            {Object.keys(RARITY_CAPS).map(r=>{const bc=BUFF_CHANCE[r]||0;return <div key={r} className="rarity-cap-box" onClick={()=>toggleRarityFilter(r)} style={{cursor:"pointer",opacity:rarityFilter[r]?1:0.35,transition:"opacity 0.2s"}}><span className={`badge badge-${r}`} style={{fontSize:15}}>{titleCase(r)}</span><div className="text-xs mt-2">{dc[r]}/{RARITY_CAPS[r]}</div>{bc>0&&<div style={{fontSize:13,color:"#4ade80",marginTop:4}}>{Math.round(bc*100)}% chance +1 STR</div>}</div>})}
          </div>
        </div>
        <div className="ui-card" style={{marginBottom:16}}>
          <div className="ui-card-title">Hero Checklist ({deck.length}/{DECK_SIZE})</div>
          <div style={{fontSize:16,color:"#94a3b8",marginBottom:12}}>Missing a hero? Click the <span style={{color:"#f87171"}}>red link</span> to view marketplace.</div>
          {(()=>{
            const deckHeroes=new Set(deck.map(c=>getHeroKey(c)));
            const ownedHeroes=new Set(ownedCards.map(c=>getHeroKey(c)));
            // Build merged hero list: use actual card names where available, fill gaps from master list
            const seen=new Map(); // normalizedKey -> display name
            ownedCards.forEach(c=>{ const k=getHeroKey(c); if(!seen.has(k)) seen.set(k, c.name); });
            ALL_HEROES.forEach(name=>{ const k=normalizeHeroName(name); if(!seen.has(k)) seen.set(k, name); });
            const heroList=[...seen.entries()].sort((a,b)=>a[1].localeCompare(b[1]));
            const cols=5, rows=Math.ceil(heroList.length/5);
            const colArrays=[];
            for(let col=0;col<cols;col++) colArrays.push(heroList.slice(col*rows,(col+1)*rows));
            return(
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:4,fontSize:16}}>
                {colArrays.map((col,ci)=>
                  <div key={ci} style={{display:"flex",flexDirection:"column",gap:2}}>
                    {col.map(([key,name])=>{
                      const inDeck=deckHeroes.has(key);
                      const owned=ownedHeroes.has(key);
                      const marketUrl="https://heroes.atomichub.io/market?blockchain=wax-mainnet&collection_name=officialhero&order=asc&primary_chain=wax-mainnet&schema_name=series1&sort=price&symbol=WAX&search="+encodeURIComponent(name);
                      return(
                        <div key={key} style={{display:"flex",alignItems:"center",gap:4,padding:"2px 0",color:inDeck?"#4ade80":"#ef4444"}}>
                          <span style={{fontSize:17,lineHeight:1}}>{inDeck?"✓":"✗"}</span>
                          {!owned?(
                            <a href={marketUrl} target="_blank" rel="noopener noreferrer" style={{color:"#ef4444",fontSize:15,textDecoration:"underline",textDecorationStyle:"dotted",opacity:0.8}}>{name}</a>
                          ):(
                            <span style={{color:inDeck?"#e2e8f0":"#64748b",fontSize:15}}>{name}</span>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })()}
        </div>
        <div className="text-sm text-slate mb-4" style={{marginBottom:16}}>
          {demoMode
            ? `Demo Mode: Showing all ${ownedCards.length} cards (50 heroes x 5 rarities).`
            : isConnected
            ? `Showing ${ownedCards.length} cards from ${walletAccount}'s inventory.`
            : "Connect your WAX wallet to load your cards and build a deck."}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {groupCardsByHero(ownedCards).filter(([,variants])=>variants.some(c=>rarityFilter[c.rarity])).map(([heroKey, variants])=>{
            const selectedVariant=variants.find(c=>deck.some(d=>d.id===c.id));
            const heroImg=variants[0]?.img;
            return(
              <div key={heroKey} className={`collection-card ${selectedVariant?"in-deck-"+selectedVariant.rarity:""}`} style={{padding:16}}>
                <div style={{display:"flex",gap:16,alignItems:"flex-start"}}>
                  {heroImg && <div style={{flexShrink:0,width:80,height:100,borderRadius:10,overflow:"hidden",background:"rgba(0,0,0,0.2)",padding:4}}>
                    <img src={buildImageUrl(heroImg)} alt={variants[0].name} style={{width:"100%",height:"100%",objectFit:"contain",borderRadius:8}} onError={(e)=>{e.target.style.display="none"}} />
                  </div>}
                  <div style={{flex:1}}>
                    <div style={{fontSize:22,fontWeight:700,marginBottom:8,color:selectedVariant?undefined:"#94a3b8"}}>
                      {variants[0].name}
                      {selectedVariant&&<span className={`badge badge-${selectedVariant.rarity}`} style={{marginLeft:8,fontSize:15}}>{titleCase(selectedVariant.rarity)} selected</span>}
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                      {variants.map(card=>{
                        const inDeck=deck.some(c=>c.id===card.id);
                        const otherSelected=selectedVariant&&!inDeck;
                        const ok=canAdd(card,deck);
                        return(
                          <button key={card.id}
                            className={`btn btn-sm ${inDeck?"btn-secondary":""}`}
                            style={{
                              display:"flex",alignItems:"center",gap:6,padding:"6px 12px",
                              opacity:otherSelected?0.35:1,
                              border:inDeck?"2px solid #fde68a":"1px solid rgba(255,255,255,0.1)",
                              background:inDeck?"rgba(253,230,138,0.15)":"rgba(255,255,255,0.05)",
                            }}
                            onClick={()=>toggleCard(card)}
                            disabled={!inDeck&&!ok}
                          >
                            <span className={`badge badge-${card.rarity}`} style={{fontSize:14}}>{titleCase(card.rarity)}</span>
                            <span style={{fontSize:16,color:"#e2e8f0"}}>STR: {getCardStrength(card)}</span>
                            <span style={{fontSize:15,color:inDeck?"#fde68a":"#64748b"}}>{inDeck?"✓":""}</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>}

      {/* ═══════════ POWERS TAB ═══════════ */}
      {/* Power Registry tab content — hidden but preserved for future ability system */}
      {tab==="powers"&&<div className="space">
        <div className="ui-card">
          <div className="ui-card-title">Power Registry</div>
          <div className="text-sm text-slate mb-4">Shows which heroes have powers and whether the power came from a template match or name-based fallback.</div>
          <div className="grid-3">
            {ownedCards.map(card=>{
              const powerName=getHeroPowerName(card);
              const chance=BUFF_CHANCE[card.rarity]||0;
              return(
                <div key={card.id} className="collection-card">
                  {card.img && <div style={{marginBottom:10,borderRadius:12,overflow:"hidden",background:"rgba(0,0,0,0.2)",padding:8}}>
                    <img src={buildImageUrl(card.img)} alt={card.name} style={{width:"100%",height:100,objectFit:"contain",borderRadius:8}} onError={(e)=>{e.target.style.display="none"}} />
                  </div>}
                  <div className={`name-${card.rarity}`} style={{fontSize:22,fontWeight:700}}>{card.name}</div>
                  <div className="flex-wrap mt-2 gap-2">
                    <span className={`badge badge-${card.rarity}`}>{titleCase(card.rarity)}</span>
                    <span className="badge badge-outline">STR: {getCardStrength(card)}</span>
                  </div>
                  {powerName?(<div className="power-box mt-3"><div style={{fontWeight:600}}>{powerName}</div><div className="text-xs mt-2">{chance>0?`${Math.round(chance*100)}% chance for +1 STR`:"No buff effect"}</div></div>)
                  :(<div className="no-power-box mt-3 text-sm">No power assigned.</div>)}
                </div>
              );
            })}
          </div>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
